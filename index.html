<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>bowbow記帳本</title>

  <meta name="apple-mobile-web-app-title" content="bowbow記帳本">
  <meta name="application-name" content="bowbow記帳本">

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            milk: "#FFF7FA",
            milk2: "#FFEFF4",
            berry: "#FF6C9F",
            blush: "#FFB7CE",
            pastel: "#FFE3ED",
            ink: "#2b2b3c",
            success: "#10B981", 
            danger: "#EF4444",  
          },
          boxShadow: {
            soft: "0 0 0 rgba(0,0,0,0)",
            float: "0 8px 20px rgba(255, 108, 159, 0.3)",
          },
        },
      },
    };
  </script>

  <style>
    .slide {
      animation: slideDown .25s ease-out;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    input[type="date"],
    input[type="month"] {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
      padding-left: 8px !important;
      padding-right: 8px !important;
    }

    .btn-selected {
      background-color: #FF6C9F !important;
      color: #ffffff !important;
    }

    .shadow-soft {
      box-shadow: none !important;
    }

    .sub-popup {
      position: absolute;
      z-index: 50;
      background: white;
      border: 1px solid #FFD6E8;
      border-radius: 12px;
      padding: 8px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 160px;
      box-shadow: 0 4px 10px rgba(255, 150, 186, 0.25);
    }

    /* Checkbox 自訂樣式 */
    .custom-checkbox {
      accent-color: #FF6C9F;
      width: 18px;
      height: 18px;
    }
    
    .bill-done {
      text-decoration: line-through;
      color: #cbd5e1;
    }
  </style>
</head>

<body class="min-h-screen bg-milk text-ink pb-20">
  <div class="max-w-xl mx-auto px-4 py-6 space-y-6">

    <section class="bg-white rounded-2xl shadow-soft border border-pastel p-5 relative">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold flex items-center gap-2">✨ 本月總覽</h1>
        <input
          id="monthFilter"
          type="month"
          class="px-2 py-1.5 rounded-xl border border-pastel text-xs bg-milk2 text-ink outline-none"
        />
      </div>

      <div class="flex justify-between items-center bg-milk2 rounded-xl p-3 mb-4">
        <div class="text-center w-1/3">
          <p class="text-[11px] text-slate-500 mb-1">收入</p>
          <p id="sumIncome" class="text-sm font-semibold text-green-600">$0</p>
        </div>
        <div class="text-center w-1/3 border-l border-r border-white">
          <p class="text-[11px] text-slate-500 mb-1">支出</p>
          <p id="sumExpense" class="text-sm font-semibold text-red-400">$0</p>
        </div>
        <div class="text-center w-1/3">
          <p class="text-[11px] text-slate-500 mb-1">儲蓄</p>
          <p id="sumSaving" class="text-sm font-semibold text-blue-400">$0</p>
        </div>
      </div>
      
      <div class="mb-4">
        <canvas id="expensePieChart" height="130" style="max-width:180px; margin:0 auto;"></canvas>
      </div>

      <div class="bg-berry text-white rounded-xl p-4 flex justify-between items-center shadow-sm">
        <div class="flex flex-col">
          <span class="text-xs opacity-80 mb-0.5">本月可用現金</span>
          <span class="text-xs opacity-60">(收入 - 支出 - 儲蓄)</span>
        </div>
        <span id="sumBalance" class="text-xl font-bold">$0</span>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow-soft border border-pastel p-5 border-l-4 border-l-berry">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-lg font-bold flex items-center gap-2 text-berry">📝 固定代繳筆記本</h2>
        <button id="toggleBillBtn" class="text-xs bg-milk2 px-2 py-1 rounded-lg text-berry">
          收合 ▼
        </button>
      </div>

      <div id="billSectionContent">
        <div id="billList" class="space-y-2 mt-2"></div>

        <button id="addBillBtn" class="w-full mt-4 py-2 border border-dashed border-berry text-berry rounded-xl text-xs font-medium hover:bg-milk2 transition">
          ＋ 新增筆記項目
        </button>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow-soft border border-pastel p-5">
      <h2 class="text-lg font-semibold flex items-center gap-2">🍓 新增記錄</h2>

      <div class="grid grid-cols-3 gap-3 mt-4">
        <button id="btnIncome" type="button"
          class="py-2 rounded-xl bg-milk2 text-ink text-sm font-medium">💗 收入</button>
        <button id="btnExpense" type="button"
          class="py-2 rounded-xl bg-milk2 text-ink text-sm font-medium">🧾 支出</button>
        <button id="btnSaving" type="button"
          class="py-2 rounded-xl bg-milk2 text-ink text-sm font-medium">🐷 儲蓄</button>
      </div>

      <form id="entryForm" class="mt-5 space-y-4 hidden slide">
        <div>
          <label class="text-xs">金額</label>
          <input
            id="amountInput"
            type="number"
            inputmode="numeric" 
            pattern="[0-9]*"
            class="w-full mt-2 mb-2 px-3 py-2 rounded-xl border border-slate-300 text-sm bg-white"
            placeholder="請輸入金額"
          />
        </div>

        <div>
          <label class="text-xs">日期</label>
          <input
            id="dateInput"
            type="date"
            class="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 text-sm"
          />
        </div>

        <div id="expenseCategoryBlock" class="hidden">
          <label class="text-xs">主要分類</label>
          <div id="mainCategoryButtons" class="grid grid-cols-3 gap-2 mt-2 text-xs"></div>
        </div>

        <div>
          <label class="text-xs">備註</label>
          <input
            id="noteInput"
            type="text"
            maxlength="40"
            class="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 text-sm"
            placeholder="可留白"
          />
        </div>

        <button
          type="submit"
          class="w-full py-2.5 bg-berry text-white rounded-xl shadow-soft text-sm"
        >
          ＋ 加入紀錄
        </button>
        <p id="formError" class="text-xs text-red-500 hidden"></p>
      </form>
    </section>

    <section class="p-4 bg-white rounded-xl border border-pastel">
      <button
        id="toggleRecords"
        class="w-full flex justify-between items-center py-2 px-3 bg-milk2 rounded-xl text-sm font-semibold"
      >
        <span>📋 本月明細清單</span>
        <span id="recordsArrow">▼</span>
      </button>

      <div id="recordsContent" class="mt-3 space-y-2 hidden">
        <div id="recordCount" class="text-xs text-slate-500"></div>
        <div id="mobileList" class="space-y-3"></div>
        <p id="emptyHint" class="text-xs text-slate-400 mt-2 hidden">目前沒有紀錄。</p>
      </div>
    </section>

    <section class="p-4 bg-white rounded-xl border border-pastel mt-4">
      <button
        id="toggleBudgetBtn"
        class="w-full flex justify-between items-center py-2 px-3 bg-milk2 rounded-xl text-sm font-semibold"
      >
        <span>📂 分類預算管理</span>
        <span id="budgetArrow">▼</span>
      </button>

      <div id="budgetContent" class="mt-3 hidden">
        <div id="budgetInputs" class="space-y-2"></div>
        <button
          id="saveBudgetBtn"
          class="mt-3 w-full bg-pink-300 text-white py-2 rounded-xl"
        >
          儲存分類預算
        </button>
      </div>
    </section>

  </div>

  <div id="categoryBudgetStatus" class="space-y-1 mt-3 max-w-xl mx-auto px-4 pb-10"></div>

  <button id="calcFab" class="fixed bottom-6 right-6 bg-berry text-white w-14 h-14 rounded-full shadow-float flex items-center justify-center text-2xl z-40 hover:bg-pink-500 transition-transform active:scale-95">
    🧮
  </button>

  <div id="calcModal" class="fixed inset-0 bg-black/20 z-50 hidden items-center justify-center backdrop-blur-sm">
    <div class="bg-white p-5 rounded-3xl shadow-xl w-72 border border-pastel slide">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-ink font-bold flex items-center gap-2">🌸 小計算機</h3>
        <button id="closeCalcBtn" class="text-slate-400 hover:text-red-400 text-2xl leading-none">&times;</button>
      </div>
      
      <div class="bg-milk2 rounded-xl p-3 mb-4 text-right overflow-hidden shadow-inner">
        <div id="calcHistory" class="text-xs text-slate-400 min-h-[16px] tracking-wider"></div>
        <div id="calcDisplay" class="text-3xl font-bold text-ink mt-1 truncate">0</div>
      </div>
      
      <div class="grid grid-cols-4 gap-2 text-sm" id="calcKeypad">
        <button class="bg-slate-100 text-ink p-3 rounded-xl font-medium hover:bg-slate-200" data-val="C">C</button>
        <button class="bg-slate-100 text-ink p-3 rounded-xl font-medium hover:bg-slate-200" data-val="DEL">⌫</button>
        <button class="bg-slate-100 text-ink p-3 rounded-xl font-medium hover:bg-slate-200" data-val="%">%</button>
        <button class="bg-blush text-white p-3 rounded-xl font-bold hover:bg-berry" data-val="/">÷</button>

        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="7">7</button>
        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="8">8</button>
        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="9">9</button>
        <button class="bg-blush text-white p-3 rounded-xl font-bold hover:bg-berry" data-val="*">×</button>

        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="4">4</button>
        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="5">5</button>
        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="6">6</button>
        <button class="bg-blush text-white p-3 rounded-xl font-bold hover:bg-berry" data-val="-">-</button>

        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="1">1</button>
        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="2">2</button>
        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val="3">3</button>
        <button class="bg-blush text-white p-3 rounded-xl font-bold hover:bg-berry" data-val="+">+</button>

        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk col-span-2" data-val="0">0</button>
        <button class="bg-white border border-pastel text-ink p-3 rounded-xl font-medium shadow-sm hover:bg-milk" data-val=".">.</button>
        <button class="bg-berry text-white p-3 rounded-xl font-bold shadow-md hover:bg-pink-500" data-val="=">=</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    /* ------- 分類資料 ------- */
    const categoryData = {
      "🍱 飲食": ["早餐", "午餐", "晚餐", "點心", "宵夜", "小吃", "飲料", "其他"],
      "🚗 交通": ["大眾運輸", "加油", "Uber／計程車", "停車費", "其他"],
      "🛒 生活": ["個人用品", "家用清潔用品", "衛生用品", "文具小物", "五金工具", "其他"],
      "🛍️ 購物": ["衣服", "鞋子", "配件", "美妝", "保養品", "居家小物", "其他"],
      "💳 帳單": ["卡費", "手機費", "健保費", "房租", "電費", "水費", "網路", "其他"],
      "🐱 貓咪": ["罐頭", "乾乾", "零食", "貓砂", "玩具", "預防針／醫療", "用品", "其他"],
      "💖 美容": ["美甲", "美睫", "臉部保養", "頭髮", "其他"],
      "🎮 娛樂": ["電影", "KTV", "遊戲", "聚會", "閱讀／學習", "其他"],
      "🏥 醫療": ["看診", "藥品", "健康檢查", "其他醫療"],
      "✈️ 旅遊": ["住宿", "交通", "門票", "伴手禮", "其他"],
      "🎀 其他": ["臨時開銷", "小額花費", "其他"]
    };

    const STORAGE_KEY = "cute-book-entries-v2";
    const CATEGORY_BUDGET_KEY = "cute-budget-category-v1";
    const FIXED_BILLS_KEY = "cute-fixed-bills-v2"; 

    /* ------- DOM ------- */
    const sumIncome = document.getElementById("sumIncome");
    const sumSaving = document.getElementById("sumSaving");
    const sumExpense = document.getElementById("sumExpense");
    const sumBalance = document.getElementById("sumBalance"); 

    const monthFilter = document.getElementById("monthFilter");
    const btnIncome = document.getElementById("btnIncome");
    const btnExpense = document.getElementById("btnExpense");
    const btnSaving = document.getElementById("btnSaving");

    const entryForm = document.getElementById("entryForm");
    const amountInput = document.getElementById("amountInput");
    const dateInput = document.getElementById("dateInput");
    const noteInput = document.getElementById("noteInput");
    const formError = document.getElementById("formError");

    const expenseCategoryBlock = document.getElementById("expenseCategoryBlock");
    const mainCategoryButtons = document.getElementById("mainCategoryButtons");

    const recordCount = document.getElementById("recordCount");
    const mobileList = document.getElementById("mobileList");
    const emptyHint = document.getElementById("emptyHint");

    const budgetInputs = document.getElementById("budgetInputs");
    const saveBudgetBtn = document.getElementById("saveBudgetBtn");
    const budgetBtn = document.getElementById("toggleBudgetBtn");
    const budgetContent = document.getElementById("budgetContent");
    const budgetArrow = document.getElementById("budgetArrow");

    const categoryBudgetStatusBox = document.getElementById("categoryBudgetStatus");

    const billListEl = document.getElementById("billList");
    const addBillBtn = document.getElementById("addBillBtn");
    const toggleBillBtn = document.getElementById("toggleBillBtn");
    const billSectionContent = document.getElementById("billSectionContent");

    /* ------- 狀態 ------- */
    let entries = [];
    let selectedType = null;
    let selectedMainCategory = null;
    let selectedSubCategory = null;
    let categoryBudgets = {};
    let pieChart = null;

    let fixedBills = [
      { id: 'b1', name: '房租+水電', amount: 18186, done: false },
      { id: 'b2', name: '健保', amount: 1982, done: false },
      { id: 'b3', name: '健保', amount: 826, done: false },
      { id: 'b4', name: '手機費', amount: 1657, done: false },
      { id: 'b5', name: '卡費', amount: 16393, done: true } 
    ];

    function showError(msg) {
      formError.textContent = msg;
      formError.classList.remove("hidden");
    }

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyePbfCt3HsLD-cKRqZfREIsB07FGiecvFiPiXpGMVHWAdC0_JgmOW0OzvRXlzXqFV4/exec'; 

    async function sendActionToSheet(data) {
        const isDelete = data.action === 'DELETE';
        const actionName = isDelete ? '刪除' : '新增';
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(data),
                redirect: 'follow'
            });

            const result = await response.json();

            if (result.status === 'success') {
                console.log(`✅ 資料${actionName}成功:`, result.message);
                return true;
            } else {
                console.error(`❌ 資料${actionName}失敗:`, result.message);
                alert(`${actionName}失敗：${result.message}`);
                return false;
            }

        } catch (err) {
            console.error(`❌ ${actionName}時發生錯誤:`, err);
            return false;
        }
    }

    async function loadDataFromSheet() {
        try {
            const response = await fetch(SCRIPT_URL, { method: 'GET' });
            const result = await response.json();

            if (result.status === 'success' && Array.isArray(result.data)) {
                entries = result.data.map(e => ({
                    ...e,
                    amount: parseFloat(e.amount),
                    id: String(e.id)
                }));
                
                saveEntries();
                render(); 
                return true;
            }
        } catch (err) {
            console.error('❌ 雲端連線錯誤 (GET):', err);
            return false;
        }
    }

    /* =========================================
        初始化
    ========================================= */
    async function init() {
      const t = new Date();
      const yyyy = t.getFullYear();
      const mm = String(t.getMonth() + 1).padStart(2, "0");
      const dd = String(t.getDate()).padStart(2, "0");
      dateInput.value = `${yyyy}-${mm}-${dd}`;
      monthFilter.value = `${yyyy}-${mm}`;

      loadEntries();       
      loadCategoryBudgets();
      loadFixedBills();
      renderBudgetInputs();
      renderFixedBills();
      render();

      await loadDataFromSheet(); 
    }

    /* =========================================
        LocalStorage
    ========================================= */
    function loadEntries() {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    }
    function saveEntries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }
    function loadCategoryBudgets() {
      const raw = localStorage.getItem(CATEGORY_BUDGET_KEY);
      categoryBudgets = raw ? JSON.parse(raw) : {};
    }
    function saveCategoryBudgets() {
      localStorage.setItem(CATEGORY_BUDGET_KEY, JSON.stringify(categoryBudgets));
    }
    function loadFixedBills() {
      const raw = localStorage.getItem(FIXED_BILLS_KEY);
      if (raw) {
        fixedBills = JSON.parse(raw);
      } else {
        saveFixedBills(); 
      }
    }
    function saveFixedBills() {
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills));
      renderFixedBills(); 
    }

    function formatMoney(n) {
      if (!n) return "$0";
      return "$" + n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    /* =========================================
        代繳清單 (純筆記本)
    ========================================= */
    function renderFixedBills() {
      billListEl.innerHTML = "";
      
      fixedBills.forEach((bill, index) => {
        const row = document.createElement("div");
        row.className = "flex items-center gap-2 py-1.5 border-b border-pastel last:border-0";
        
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "custom-checkbox flex-shrink-0";
        checkbox.checked = bill.done;
        checkbox.onclick = () => {
          fixedBills[index].done = checkbox.checked;
          saveFixedBills();
        };

        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.value = bill.name;
        nameInput.className = `w-full bg-transparent outline-none px-1 text-sm ${bill.done ? 'bill-done' : 'text-ink'}`;
        nameInput.placeholder = "輸入項目";
        nameInput.onchange = (e) => {
          fixedBills[index].name = e.target.value;
          saveFixedBills();
        };

        const amtInput = document.createElement("input");
        amtInput.type = "number";
        amtInput.value = bill.amount;
        amtInput.className = `w-20 text-right bg-transparent outline-none px-1 text-sm ${bill.done ? 'bill-done' : 'text-ink'}`;
        amtInput.placeholder = "$";
        amtInput.onchange = (e) => {
          fixedBills[index].amount = Number(e.target.value);
          saveFixedBills();
        };

        const delBtn = document.createElement("button");
        delBtn.innerHTML = "&times;";
        delBtn.className = "text-slate-300 px-2 text-xl hover:text-red-400 pb-1";
        delBtn.onclick = () => {
          if (confirm(`刪除此筆記項目？`)) {
            fixedBills.splice(index, 1);
            saveFixedBills();
          }
        };

        row.appendChild(checkbox);
        row.appendChild(nameInput);
        row.appendChild(amtInput);
        row.appendChild(delBtn);
        billListEl.appendChild(row);
      });
    }

    addBillBtn.onclick = () => {
      fixedBills.push({ id: Date.now().toString(), name: "", amount: "", done: false });
      saveFixedBills();
    };

    toggleBillBtn.onclick = () => {
       const isHidden = billSectionContent.classList.contains("hidden");
       if (isHidden) {
         billSectionContent.classList.remove("hidden");
         toggleBillBtn.textContent = "收合 ▼";
       } else {
         billSectionContent.classList.add("hidden");
         toggleBillBtn.textContent = "展開 ▲";
       }
    };

    /* =========================================
        分類渲染
    ========================================= */
    function renderMainCategories() {
      mainCategoryButtons.innerHTML = "";
      let openedPopup = null;

      Object.keys(categoryData).forEach((cat) => {
        const wrap = document.createElement("div");
        wrap.className = "relative";

        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = cat;
        btn.dataset.cat = cat; 
        btn.className = "w-full py-2 px-2 bg-milk2 border border-pastel rounded-xl text-xs";

        const popup = document.createElement("div");
        popup.className = "sub-popup";

        categoryData[cat].forEach((sub) => {
          const sbtn = document.createElement("button");
          sbtn.type = "button";
          sbtn.textContent = sub;
          sbtn.className = "px-3 py-1 bg-white border border-pastel rounded-full text-[11px]";

          sbtn.addEventListener("click", () => {
            selectedMainCategory = cat;
            selectedSubCategory = sub;

            mainCategoryButtons
              .querySelectorAll(".sub-popup button")
              .forEach((b) => b.classList.remove("btn-selected"));
            sbtn.classList.add("btn-selected");

            mainCategoryButtons.querySelectorAll("button").forEach((b) => {
              if (b.dataset.cat) b.textContent = b.dataset.cat;
            });
            btn.textContent = `${cat}｜${sub}`;
            popup.style.display = "none";
            openedPopup = null;
          });
          popup.appendChild(sbtn);
        });

        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          mainCategoryButtons.querySelectorAll("button").forEach((b) => {
            if (b.dataset.cat) b.textContent = b.dataset.cat;
          });

          if (openedPopup && openedPopup !== popup) {
            openedPopup.style.display = "none";
          }
          const open = popup.style.display !== "flex";
          popup.style.display = open ? "flex" : "none";
          openedPopup = open ? popup : null;
        });

        wrap.appendChild(btn);
        wrap.appendChild(popup);
        mainCategoryButtons.appendChild(wrap);
      });

      document.addEventListener("click", (e) => {
        if (!mainCategoryButtons.contains(e.target)) {
          mainCategoryButtons
            .querySelectorAll(".sub-popup")
            .forEach((p) => (p.style.display = "none"));
          openedPopup = null;
        }
      });
    }

    function highlightType(type) {
      [btnIncome, btnExpense, btnSaving].forEach((btn) =>
        btn.classList.remove("btn-selected")
      );
      if (type === "income") btnIncome.classList.add("btn-selected");
      if (type === "expense") btnExpense.classList.add("btn-selected");
      if (type === "saving") btnSaving.classList.add("btn-selected");
      selectedType = type;
    }

    btnIncome.onclick = () => {
      entryForm.classList.remove("hidden");
      expenseCategoryBlock.classList.add("hidden");
      selectedMainCategory = null;
      selectedSubCategory = null;
      highlightType("income");
    };

    btnExpense.onclick = () => {
      entryForm.classList.remove("hidden");
      expenseCategoryBlock.classList.remove("hidden");
      selectedMainCategory = null;
      selectedSubCategory = null;
      renderMainCategories();
      highlightType("expense");
    };

    btnSaving.onclick = () => {
      entryForm.classList.remove("hidden");
      expenseCategoryBlock.classList.add("hidden");
      selectedMainCategory = null;
      selectedSubCategory = null;
      highlightType("saving");
    };

    entryForm.onsubmit = async (e) => { 
      e.preventDefault();
      formError.classList.add("hidden");
      
      const amount = Number(amountInput.value);
      const date = dateInput.value;
      const note = noteInput.value.trim();

      if (!selectedType) return showError("請先選擇 收入 / 支出 / 儲蓄 類型。");
      if (amount <= 0 || !date) return showError("請確認金額與日期都有填寫，金額需大於 0。");

      let mainCat = null;
      let subCat = null;

      if (selectedType === "expense") {
        if (!selectedMainCategory || !selectedSubCategory)
          return showError("支出請選擇主要分類與子分類。");
        mainCat = selectedMainCategory;
        subCat = selectedSubCategory;
      }

      const id = Date.now().toString();

      const entry = {
        id, type: selectedType, amount, date, note,
        mainCategory: mainCat, subCategory: subCat,
        createdAt: new Date().toISOString(),
      };

      entries.push(entry);
      saveEntries();
      render(); 

      const success = await sendActionToSheet(entry);
      if (success) {
        amountInput.value = "";
        noteInput.value = "";
      }
    }; 

    function getFilteredEntries() {
      const month = monthFilter.value;
      return entries
        .filter((e) => e.date?.startsWith(month))
        .sort((a, b) => (b.date + b.createdAt).localeCompare(a.date + a.createdAt));
    }

    function render() {
      const list = getFilteredEntries();
      renderSummary(list);
      renderList(list);
      renderCategoryBudgetStatus(list);
      renderExpensePieChart(list);
    }

    /* =========================================
        Summary (含餘額計算)
    ========================================= */
    function renderSummary(list) {
      let income = 0, saving = 0, expense = 0;

      list.forEach((e) => {
        if (e.type === "income") income += e.amount;
        if (e.type === "saving") saving += e.amount;
        if (e.type === "expense") expense += e.amount;
      });

      sumIncome.textContent = formatMoney(income);
      sumSaving.textContent = formatMoney(saving);
      sumExpense.textContent = formatMoney(expense);
      
      const balance = income - expense - saving;
      sumBalance.textContent = formatMoney(balance);
    }

    /* =========================================
        分類預算狀態
    ========================================= */
    function renderCategoryBudgetStatus(list) {
      categoryBudgetStatusBox.innerHTML = "";
      const categorySpent = {};
      list.forEach((e) => {
        if (e.type === "expense" && e.mainCategory) {
          if (!categorySpent[e.mainCategory]) categorySpent[e.mainCategory] = 0;
          categorySpent[e.mainCategory] += e.amount;
        }
      });

      Object.keys(categoryBudgets).forEach((cat) => {
        const budget = categoryBudgets[cat] || 0;
        const spent = categorySpent[cat] || 0;
        if (!budget && !spent) return;

        const remain = budget - spent;
        const isOver = remain < 0;

        const row = document.createElement("div");
        row.className = "p-2 rounded-lg text-xs";
        row.innerHTML = `
          <div class="flex justify-between">
            <span>${cat}</span>
            <span class="${isOver ? "text-red-500 font-semibold" : "text-ink"}">
              已花 ${formatMoney(spent)}
              ${budget ? `｜${isOver ? `<span class='text-red-500'>超支 ${formatMoney(Math.abs(remain))}</span>` : `剩餘 ${formatMoney(remain)}`}` : ""}
            </span>
          </div>
        `;
        categoryBudgetStatusBox.appendChild(row);
      });
    }

    /* =========================================
        明細清單
    ========================================= */
    function renderList(list) {
      recordCount.textContent = `共 ${list.length} 筆`;
      mobileList.innerHTML = "";

      if (!list.length) {
        emptyHint.classList.remove("hidden");
        return;
      }
      emptyHint.classList.add("hidden");

      list.forEach((e) => {
        const card = document.createElement("div");
        card.className = "bg-milk2 rounded-xl p-3 text-sm";
        let typeText = e.type === "income" ? "💗 收入" : e.type === "saving" ? "🐷 儲蓄" : "🧾 支出";

        card.innerHTML = `
          <div class="flex justify-between items-start gap-2">
            <div>
              <p class="font-medium">${typeText}</p>
              <p class="text-[11px] text-slate-500">${e.date ? e.date.split("T")[0] : ""}</p>
              ${e.type === "expense" ? `<p class="text-[11px] text-slate-500">${e.mainCategory}｜${e.subCategory || "未分類"}</p>` : ""}
              <p class="text-[11px] text-slate-400">${e.note || "（無備註）"}</p>
            </div>
            <div class="text-right">
              <p class="text-base font-semibold">${formatMoney(e.amount)}</p>
              <button data-id="${e.id}" class="text-[11px] text-red-500 mt-1">刪除</button>
            </div>
          </div>
        `;
        mobileList.appendChild(card);
      });

      mobileList.querySelectorAll("button[data-id]").forEach((btn) => {
          btn.onclick = async () => {
              const entryId = btn.dataset.id;
              if (!confirm(`確定要刪除這筆 ID: ${entryId} 的紀錄嗎？雲端也會同步刪除。`)) return;

              const deletePayload = { action: 'DELETE', id: entryId };
              const success = await sendActionToSheet(deletePayload);

              if (success) {
                  entries = entries.filter((e) => e.id !== entryId);
                  saveEntries();
                  render();
              } 
          };
      });
    }

    function renderBudgetInputs() {
      budgetInputs.innerHTML = "";
      Object.keys(categoryData).forEach((cat) => {
        const row = document.createElement("div");
        row.className = "flex justify-between items-center";
        row.innerHTML = `
          <span class="text-sm">${cat}</span>
          <input class="w-24 px-2 py-1 rounded-lg border border-slate-300 text-sm" type="number" data-cat="${cat}" value="${categoryBudgets[cat] || ""}"/>
        `;
        budgetInputs.appendChild(row);
      });
    }

    saveBudgetBtn.onclick = () => {
      const inputs = budgetInputs.querySelectorAll("input");
      inputs.forEach((i) => { categoryBudgets[i.dataset.cat] = Number(i.value || 0); });
      saveCategoryBudgets();
      alert("分類預算已更新 ✓");
    };

    budgetBtn.onclick = () => {
      const isOpen = !budgetContent.classList.contains("hidden");
      budgetContent.classList.toggle("hidden");
      budgetArrow.textContent = isOpen ? "▼" : "▲";
    };

    monthFilter.onchange = render;

    const toggleRecords = document.getElementById("toggleRecords");
    const recordsContent = document.getElementById("recordsContent");
    const recordsArrow = document.getElementById("recordsArrow");
    let recordsOpen = false;

    toggleRecords.addEventListener("click", () => {
      recordsOpen = !recordsOpen;
      recordsContent.classList.toggle("hidden");
      recordsArrow.textContent = recordsOpen ? "▲" : "▼";
    });

    function renderExpensePieChart(list) {
      const expenses = list.filter((e) => e.type === "expense");
      if (!expenses.length) {
        if (pieChart) { pieChart.destroy(); pieChart = null; }
        return;
      }
      const categoryMap = {};
      expenses.forEach((e) => {
        if (!categoryMap[e.mainCategory]) categoryMap[e.mainCategory] = 0;
        categoryMap[e.mainCategory] += e.amount;
      });

      const labels = Object.keys(categoryMap);
      const data = Object.values(categoryMap);
      const ctx = document.getElementById("expensePieChart");

      if (pieChart) pieChart.destroy();
      pieChart = new Chart(ctx, {
        type: "pie",
        data: {
          labels: labels,
          datasets: [{
            data: data,
            backgroundColor: ["#FFB7CE","#FF6C9F","#FFE3ED","#FFD1DC","#FFC7E3","#FF8FB2","#F9A8D4","#FBCFE8"],
            borderWidth: 1
          }]
        },
        options: {
          plugins: { legend: { display: true, position: "bottom", labels: { font: { size: 12 } } } }
        }
      });
    }

    /* =========================================
        小計算機邏輯
    ========================================= */
    const calcFab = document.getElementById('calcFab');
    const calcModal = document.getElementById('calcModal');
    const closeCalcBtn = document.getElementById('closeCalcBtn');
    const calcDisplay = document.getElementById('calcDisplay');
    const calcHistory = document.getElementById('calcHistory');
    
    let currentInput = '0';
    let previousInput = '';
    let operator = null;

    calcFab.onclick = () => calcModal.classList.replace('hidden', 'flex');
    closeCalcBtn.onclick = () => calcModal.classList.replace('flex', 'hidden');

    document.getElementById('calcKeypad').addEventListener('click', (e) => {
      if(e.target.tagName !== 'BUTTON') return;
      const val = e.target.getAttribute('data-val');

      if (val >= '0' && val <= '9') {
        if (currentInput === '0') currentInput = val;
        else currentInput += val;
      } else if (val === '.') {
        if (!currentInput.includes('.')) currentInput += '.';
      } else if (val === 'C') {
        currentInput = '0'; previousInput = ''; operator = null; calcHistory.textContent = '';
      } else if (val === 'DEL') {
        currentInput = currentInput.slice(0, -1) || '0';
      } else if (['+', '-', '*', '/'].includes(val)) {
        if (operator && previousInput) {
          currentInput = String(calculate(previousInput, currentInput, operator));
        }
        operator = val;
        previousInput = currentInput;
        currentInput = '0';
        calcHistory.textContent = `${previousInput} ${val.replace('*','×').replace('/','÷')}`;
      } else if (val === '%') {
        currentInput = String(Number(currentInput) / 100);
      } else if (val === '=') {
        if (operator && previousInput) {
          calcHistory.textContent = `${previousInput} ${operator.replace('*','×').replace('/','÷')} ${currentInput} =`;
          currentInput = String(calculate(previousInput, currentInput, operator));
          operator = null;
          previousInput = '';
        }
      }
      
      calcDisplay.textContent = currentInput;
    });

    function calculate(num1, num2, op) {
      const n1 = parseFloat(num1);
      const n2 = parseFloat(num2);
      if(isNaN(n1) || isNaN(n2)) return 0;
      switch(op) {
        case '+': return n1 + n2;
        case '-': return n1 - n2;
        case '*': return n1 * n2;
        case '/': return n2 === 0 ? 'Error' : n1 / n2;
        default: return n2;
      }
    }

    init();

  </script>
</body>
</html>
