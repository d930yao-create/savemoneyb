<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>bowbow記帳本</title>

  <meta name="apple-mobile-web-app-title" content="bowbow記帳本">
  <meta name="application-name" content="bowbow記帳本">

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            milk: "#FFF7FA",
            milk2: "#FFEFF4",
            berry: "#FF6C9F",
            blush: "#FFB7CE",
            pastel: "#FFE3ED",
            ink: "#2b2b3c",
            success: "#10B981", 
            danger: "#EF4444",  
          },
          boxShadow: {
            soft: "0 0 0 rgba(0,0,0,0)",
            float: "0 8px 20px rgba(255, 108, 159, 0.3)",
          },
        },
      },
    };
  </script>

  <style>
    .slide {
      animation: slideDown .25s ease-out;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    input[type="date"],
    input[type="month"] {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
      padding-left: 8px !important;
      padding-right: 8px !important;
    }

    .btn-selected {
      background-color: #FF6C9F !important;
      color: #ffffff !important;
    }

    .shadow-soft {
      box-shadow: none !important;
    }

    .sub-popup {
      position: absolute;
      z-index: 50;
      background: white;
      border: 1px solid #FFD6E8;
      border-radius: 12px;
      padding: 8px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 160px;
      box-shadow: 0 4px 10px rgba(255, 150, 186, 0.25);
    }

    .custom-checkbox {
      accent-color: #FF6C9F;
      width: 18px;
      height: 18px;
      transition: all 0.3s ease;
    }
    
    .bill-done {
      text-decoration: line-through;
      color: #cbd5e1;
      opacity: 0.6;
      transition: all 0.3s ease;
    }
    
    .bill-row-transition {
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    
    .bill-fade-out {
      opacity: 0;
      transform: translateY(-10px);
    }

    /* 隱藏捲軸但保持可滑動 */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 毛玻璃質感 */
    .glass-panel {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
  </style>
</head>

<body class="min-h-screen bg-milk text-ink pb-24">
  <div class="max-w-xl mx-auto px-4 py-6 space-y-6">

    <section class="bg-white rounded-2xl shadow-soft border border-pastel p-5 relative">
      <div class="flex justify-between items-center mb-4 gap-2">

        <input

          class="px-2 py-1.5 rounded-xl border border-pastel text-xs bg-milk2 text-ink outline-none"

          <p id="sumIncome" class="text-sm font-semibold text-green-500">$0</p>
        </div>
        <div class="text-center w-1/3 border-l border-r border-white">
          <p class="text-[11px] text-slate-500 mb-1">支出</p>
          <p id="sumExpense" class="text-sm font-semibold text-red-400">$0</p>
        </div>
        <div class="text-center w-1/3">
          <p class="text-[11px] text-slate-500 mb-1">儲蓄</p>
          <p id="sumSaving" class="text-sm font-semibold text-blue-400">$0</p>
        </div>
      </div>
      
      <div class="mb-5 flex justify-center w-full">
        <div class="w-full max-w-[260px] h-[160px]">
          <canvas id="expensePieChart"></canvas>
        </div>
      </div>

      <div class="bg-milk2 border border-pastel rounded-xl p-4 flex justify-between items-center shadow-sm">
        <div class="flex flex-col">

        </div>
        <span id="sumBalance" class="text-xl font-bold text-berry">$0</span>
      </div>

    <section class="bg-white rounded-2xl shadow-soft border border-pastel p-5">
      <h2 class="text-lg font-semibold flex items-center gap-2">🍓 新增記錄</h2>

      <div class="grid grid-cols-3 gap-3 mt-4">

      <form id="entryForm" class="mt-5 space-y-4 hidden slide">

          <input
            id="amountInput"

        <div id="expenseCategoryBlock" class="hidden">

        <div>

    <section class="p-4 bg-white rounded-xl border border-pastel">

        <div id="mobileList" class="space-y-2"></div>

    <section class="p-4 bg-white rounded-xl border border-pastel mt-4">

      </svg>

  </div>

  <div id="notesModal" class="fixed inset-0 bg-black/20 z-50 hidden items-center justify-center backdrop-blur-sm px-4">
    <div class="bg-white p-5 rounded-3xl shadow-xl w-full max-w-[320px] border border-pastel slide">
      <div class="flex justify-between items-center mb-4 pb-2 border-b border-pastel">
        <h3 class="text-ink font-bold flex items-center gap-2 text-berry">📝待繳紀錄區</h3>
        <button id="closeNotesBtn" class="text-slate-400 hover:text-red-400 text-2xl leading-none">&times;</button>

        <button id="addBillBtn" class="w-full mt-4 py-2 border border-dashed border-berry text-berry rounded-xl text-xs font-medium hover:bg-milk2 transition">

  <div id="calcModal" class="fixed inset-0 bg-black/20 z-50 hidden items-center justify-center backdrop-blur-sm">

      </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    const categoryData = {
      "🍱 飲食": ["早餐", "午餐", "晚餐", "點心", "宵夜", "小吃", "飲料", "其他"],
      "🚗 交通": ["大眾運輸", "加油", "Uber／計程車", "停車費", "其他"],
      "🛒 生活": ["個人用品", "家用清潔用品", "衛生用品", "文具小物", "五金工具", "其他"],
      "🛍️ 購物": ["衣服", "鞋子", "配件", "美妝", "保養品", "居家小物", "其他"],
      "💳 帳單": ["卡費", "手機費", "健保費", "房租", "電費", "水費", "網路", "其他"],
      "🐱 貓咪": ["罐頭", "乾乾", "零食", "貓砂", "玩具", "預防針／醫療", "用品", "其他"],
      "💖 美容": ["美甲", "美睫", "臉部保養", "頭髮", "其他"],
      "🎮 娛樂": ["電影", "KTV", "遊戲", "聚會", "閱讀／學習", "其他"],
      "🏥 醫療": ["看診", "藥品", "健康檢查", "其他醫療"],
      "✈️ 旅遊": ["住宿", "交通", "門票", "伴手禮", "其他"],
      "🎀 其他": ["臨時開銷", "小額花費", "其他"]
    };

    const STORAGE_KEY = "cute-book-entries-v2";
    const CATEGORY_BUDGET_KEY = "cute-budget-category-v1";
    const FIXED_BILLS_KEY = "cute-fixed-bills-v3"; 

    const sumIncome = document.getElementById("sumIncome");
    const sumSaving = document.getElementById("sumSaving");
    const sumExpense = document.getElementById("sumExpense");
    const sumBalance = document.getElementById("sumBalance"); 

    const monthFilter = document.getElementById("monthFilter");
    const btnIncome = document.getElementById("btnIncome");
    const btnExpense = document.getElementById("btnExpense");
    const btnSaving = document.getElementById("btnSaving");

    const entryForm = document.getElementById("entryForm");
    const amountInput = document.getElementById("amountInput");
    const dateInput = document.getElementById("dateInput");
    const noteInput = document.getElementById("noteInput");
    const formError = document.getElementById("formError");

    const expenseCategoryBlock = document.getElementById("expenseCategoryBlock");
    const mainCategoryButtons = document.getElementById("mainCategoryButtons");

    const recordCount = document.getElementById("recordCount");
    const mobileList = document.getElementById("mobileList");
    const emptyHint = document.getElementById("emptyHint");

    const budgetInputs = document.getElementById("budgetInputs");
    const saveBudgetBtn = document.getElementById("saveBudgetBtn");
    const budgetBtn = document.getElementById("toggleBudgetBtn");
    const budgetContent = document.getElementById("budgetContent");
    const budgetArrow = document.getElementById("budgetArrow");

    const categoryBudgetStatusBox = document.getElementById("categoryBudgetStatus");

    const billListEl = document.getElementById("billList");
    const addBillBtn = document.getElementById("addBillBtn");

    let entries = [];
    let selectedType = null;
    let selectedMainCategory = null;
    let selectedSubCategory = null;
    let categoryBudgets = {};
    let pieChart = null;

    let fixedBills = [
      { id: 'b1', name: '房租+水電', amount: 18186 },
      { id: 'b2', name: '健保', amount: 1982 },
      { id: 'b3', name: '健保', amount: 826 },
      { id: 'b4', name: '手機費', amount: 1657 }
    ];

    let deleteTimers = {}; 

    function showError(msg) {
      formError.textContent = msg;
      formError.classList.remove("hidden");
    }

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyePbfCt3HsLD-cKRqZfREIsB07FGiecvFiPiXpGMVHWAdC0_JgmOW0OzvRXlzXqFV4/exec'; 

    async function sendActionToSheet(data) {
        const isDelete = data.action === 'DELETE';
        const actionName = isDelete ? '刪除' : '新增';
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(data),
                redirect: 'follow'
            });

            const result = await response.json();

            if (result.status === 'success') {
                return true;
            } else {
                alert(`${actionName}失敗：${result.message}`);
                return false;
            }

        } catch (err) {
            return false;
        }
    }

    async function loadDataFromSheet() {
        try {
            const response = await fetch(SCRIPT_URL, { method: 'GET' });
            const result = await response.json();

            if (result.status === 'success' && Array.isArray(result.data)) {
                entries = result.data.map(e => ({
                    ...e,
                    amount: parseFloat(e.amount),
                    id: String(e.id)
                }));
                
                saveEntries();
                render(); 
                return true;
            }
        } catch (err) {
            return false;
        }
    }

    async function init() {
      const t = new Date();
      const yyyy = t.getFullYear();
      const mm = String(t.getMonth() + 1).padStart(2, "0");
      const dd = String(t.getDate()).padStart(2, "0");
      dateInput.value = `${yyyy}-${mm}-${dd}`;
      monthFilter.value = `${yyyy}-${mm}`;

      loadEntries();       
      loadCategoryBudgets();
      loadFixedBills();
      renderBudgetInputs();
      renderFixedBills();
      render();

      await loadDataFromSheet(); 
    }

    function loadEntries() {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    }
    function saveEntries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }
    function loadCategoryBudgets() {
      const raw = localStorage.getItem(CATEGORY_BUDGET_KEY);
      categoryBudgets = raw ? JSON.parse(raw) : {};
    }
    function saveCategoryBudgets() {
      localStorage.setItem(CATEGORY_BUDGET_KEY, JSON.stringify(categoryBudgets));
    }
    function loadFixedBills() {
      const raw = localStorage.getItem(FIXED_BILLS_KEY);
      if (raw) {
        fixedBills = JSON.parse(raw);
      } else {
        saveFixedBills(); 
      }
    }
    function saveFixedBills() {
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills));
    }

    function formatMoney(n) {
      if (!n) return "$0";
      return "$" + n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function renderFixedBills() {
      billListEl.innerHTML = "";
      
      fixedBills.forEach((bill, index) => {
        const row = document.createElement("div");
        row.className = "flex items-center gap-2 py-1.5 border-b border-pastel last:border-0 bill-row-transition";
        row.id = `bill-row-${bill.id}`;
        
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "custom-checkbox flex-shrink-0";
        checkbox.checked = false; 

        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.value = bill.name;
        nameInput.className = "w-full bg-transparent outline-none px-1 text-sm text-ink";
        nameInput.placeholder = "輸入項目";
        nameInput.onchange = (e) => {
          fixedBills[index].name = e.target.value;
          saveFixedBills();
        };

        const amtInput = document.createElement("input");
        amtInput.type = "number";
        amtInput.value = bill.amount;
        amtInput.className = "w-20 text-right bg-transparent outline-none px-1 text-sm text-ink";
        amtInput.placeholder = "$";
        amtInput.onchange = (e) => {
          fixedBills[index].amount = Number(e.target.value);
          saveFixedBills();
        };

        const delBtn = document.createElement("button");
        delBtn.innerHTML = "&times;";
        delBtn.className = "text-slate-300 px-2 text-xl hover:text-red-400 pb-1";
        delBtn.onclick = () => {
          if (confirm(`確定刪除此筆記項目？`)) {
            fixedBills.splice(index, 1);
            saveFixedBills();
            renderFixedBills();
          }
        };

        checkbox.onclick = () => {
          if (checkbox.checked) {
            nameInput.classList.add("bill-done");
            amtInput.classList.add("bill-done");
            
            deleteTimers[bill.id] = setTimeout(() => {
              row.classList.add("bill-fade-out");
              
              setTimeout(() => {
                const currentIdx = fixedBills.findIndex(b => b.id === bill.id);
                if (currentIdx > -1) {
                  fixedBills.splice(currentIdx, 1);
                  saveFixedBills();
                  renderFixedBills(); 
                }
              }, 500); 
            }, 3000);

          } else {
            nameInput.classList.remove("bill-done");
            amtInput.classList.remove("bill-done");
            
            if (deleteTimers[bill.id]) {
              clearTimeout(deleteTimers[bill.id]);
              delete deleteTimers[bill.id];
            }
          }
        };

        row.appendChild(checkbox);
        row.appendChild(nameInput);
        row.appendChild(amtInput);
        row.appendChild(delBtn);
        billListEl.appendChild(row);
      });
    }

    addBillBtn.onclick = () => {
      fixedBills.push({ id: Date.now().toString(), name: "", amount: "" });
      saveFixedBills();
      renderFixedBills();
    };

    function renderMainCategories() {
      mainCategoryButtons.innerHTML = "";
      let openedPopup = null;

      Object.keys(categoryData).forEach((cat) => {
        const wrap = document.createElement("div");
        wrap.className = "relative";

        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = cat;
        btn.dataset.cat = cat; 
        btn.className = "w-full py-2 px-2 bg-white border border-pastel rounded-xl text-xs shadow-sm hover:bg-milk transition-colors";

        const popup = document.createElement("div");
        popup.className = "sub-popup";

        categoryData[cat].forEach((sub) => {
          const sbtn = document.createElement("button");
          sbtn.type = "button";
          sbtn.textContent = sub;
          sbtn.className = "px-3 py-1 bg-white border border-pastel rounded-full text-[11px]";

          sbtn.addEventListener("click", () => {
            selectedMainCategory = cat;
            selectedSubCategory = sub;

            mainCategoryButtons
              .querySelectorAll(".sub-popup button")
              .forEach((b) => b.classList.remove("btn-selected"));
            sbtn.classList.add("btn-selected");

            mainCategoryButtons.querySelectorAll("button").forEach((b) => {
              if (b.dataset.cat) b.textContent = b.dataset.cat;
            });
            btn.textContent = `${cat}｜${sub}`;
            popup.style.display = "none";
            openedPopup = null;
          });
          popup.appendChild(sbtn);
        });

        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          mainCategoryButtons.querySelectorAll("button").forEach((b) => {
            if (b.dataset.cat) b.textContent = b.dataset.cat;
          });

          if (openedPopup && openedPopup !== popup) {
            openedPopup.style.display = "none";
          }
          const open = popup.style.display !== "flex";
          popup.style.display = open ? "flex" : "none";
          openedPopup = open ? popup : null;
        });

        wrap.appendChild(btn);
        wrap.appendChild(popup);
        mainCategoryButtons.appendChild(wrap);
      });

      document.addEventListener("click", (e) => {
        if (!mainCategoryButtons.contains(e.target)) {
          mainCategoryButtons
            .querySelectorAll(".sub-popup")
            .forEach((p) => (p.style.display = "none"));
          openedPopup = null;
        }
      });
    }

    function highlightType(type) {
      [btnIncome, btnExpense, btnSaving].forEach((btn) =>
        btn.classList.remove("btn-selected")
      );
      if (type === "income") btnIncome.classList.add("btn-selected");
      if (type === "expense") btnExpense.classList.add("btn-selected");
      if (type === "saving") btnSaving.classList.add("btn-selected");
      selectedType = type;
    }

    btnIncome.onclick = () => {
      entryForm.classList.remove("hidden");
      expenseCategoryBlock.classList.add("hidden");
      selectedMainCategory = null;
      selectedSubCategory = null;
      highlightType("income");
    };

    btnExpense.onclick = () => {
      entryForm.classList.remove("hidden");
      expenseCategoryBlock.classList.remove("hidden");
      selectedMainCategory = null;
      selectedSubCategory = null;
      renderMainCategories();
      highlightType("expense");
    };

    btnSaving.onclick = () => {
      entryForm.classList.remove("hidden");
      expenseCategoryBlock.classList.add("hidden");
      selectedMainCategory = null;
      selectedSubCategory = null;
      highlightType("saving");
    };

    entryForm.onsubmit = async (e) => { 
      e.preventDefault();
      formError.classList.add("hidden");
      
      const amount = Number(amountInput.value);
      const date = dateInput.value;
      const note = noteInput.value.trim();

      if (!selectedType) return showError("請先選擇 收入 / 支出 / 儲蓄 類型。");
      if (amount <= 0 || !date) return showError("請確認金額與日期都有填寫，金額需大於 0。");

      let mainCat = null;
      let subCat = null;

      if (selectedType === "expense") {
        if (!selectedMainCategory || !selectedSubCategory)
          return showError("支出請選擇主要分類與子分類。");
        mainCat = selectedMainCategory;
        subCat = selectedSubCategory;
      }

      const id = Date.now().toString();

      const entry = {
        id, type: selectedType, amount, date, note,
        mainCategory: mainCat, subCategory: subCat,
        createdAt: new Date().toISOString(),
      };

      entries.push(entry);
      saveEntries();
      render(); 

      const success = await sendActionToSheet(entry);
      if (success) {
        amountInput.value = "";
        noteInput.value = "";
      }
    }; 

    function getFilteredEntries() {
      const month = monthFilter.value;
      return entries
        .filter((e) => e.date?.startsWith(month))
        .sort((a, b) => (b.date + b.createdAt).localeCompare(a.date + a.createdAt));
    }

    function render() {
      const list = getFilteredEntries();
      renderSummary(list);
      renderList(list);
      renderCategoryBudgetStatus(list);
      renderExpensePieChart(list);
    }

    function renderSummary(list) {
      let income = 0, saving = 0, expense = 0;

      list.forEach((e) => {
        if (e.type === "income") income += e.amount;
        if (e.type === "saving") saving += e.amount;
        if (e.type === "expense") expense += e.amount;
      });

      sumIncome.textContent = formatMoney(income);
      sumSaving.textContent = formatMoney(saving);
      sumExpense.textContent = formatMoney(expense);
      
      const balance = income - expense - saving;
      sumBalance.textContent = formatMoney(balance);
    }

    function renderCategoryBudgetStatus(list) {
      categoryBudgetStatusBox.innerHTML = "";
      const categorySpent = {};
      list.forEach((e) => {
        if (e.type === "expense" && e.mainCategory) {
          if (!categorySpent[e.mainCategory]) categorySpent[e.mainCategory] = 0;
          categorySpent[e.mainCategory] += e.amount;
        }
      });

      Object.keys(categoryBudgets).forEach((cat) => {
        const budget = categoryBudgets[cat] || 0;
        const spent = categorySpent[cat] || 0;
        if (!budget && !spent) return;

        const remain = budget - spent;
        const isOver = remain < 0;

        const row = document.createElement("div");
        row.className = "p-2 rounded-lg text-xs";
        row.innerHTML = `
          <div class="flex justify-between">
            <span>${cat}</span>
            <span class="${isOver ? "text-red-500 font-semibold" : "text-ink"}">
              已花 ${formatMoney(spent)}
              ${budget ? `｜${isOver ? `<span class='text-red-500'>超支 ${formatMoney(Math.abs(remain))}</span>` : `剩餘 ${formatMoney(remain)}`}` : ""}
            </span>
          </div>
        `;
        categoryBudgetStatusBox.appendChild(row);
      });
    }

    function renderList(list) {
      recordCount.textContent = `共 ${list.length} 筆`;
      mobileList.innerHTML = "";

      if (!list.length) {
        emptyHint.classList.remove("hidden");
        return;
      }
      emptyHint.classList.add("hidden");

      list.forEach((e) => {
        const card = document.createElement("div");
        card.className = "bg-white/80 rounded-xl p-3 text-sm shadow-sm border border-white/50";
        
        let typeBadge = e.type === "income" 
          ? `<span class="inline-block px-2 py-0.5 bg-green-50 text-green-600 rounded-md text-[10px] mr-1">💗 收入</span>` 
          : e.type === "saving" 
          ? `<span class="inline-block px-2 py-0.5 bg-blue-50 text-blue-500 rounded-md text-[10px] mr-1">🐷 儲蓄</span>` 
          : `<span class="inline-block px-2 py-0.5 bg-white text-berry border border-pastel rounded-md text-[10px] mr-1 shadow-sm">🧾 支出</span>`;

        let titleText = e.type === "expense" 
          ? `<span class="font-medium text-[13px] text-ink">${e.mainCategory}｜${e.subCategory || "未分類"}</span>`
          : `<span class="font-medium text-[13px] text-ink">${e.type === "income" ? "一般收入" : "撲滿儲蓄"}</span>`;

        card.innerHTML = `
          <div class="flex justify-between items-start gap-2">
            <div>
              <div class="flex items-center mb-1">
                ${typeBadge} ${titleText}
              </div>
              <p class="text-[11px] text-slate-400 mt-0.5">
                ${e.date ? e.date.split("T")[0] : ""} 
                ${e.note ? "・" + e.note : ""}
              </p>
            </div>
            <div class="text-right">
              <p class="text-base font-semibold text-ink">${formatMoney(e.amount)}</p>
              <button data-id="${e.id}" class="text-[11px] text-red-400 mt-1 hover:text-red-600 transition">刪除</button>
            </div>
          </div>
        `;
        mobileList.appendChild(card);
      });

      mobileList.querySelectorAll("button[data-id]").forEach((btn) => {
          btn.onclick = async () => {
              const entryId = btn.dataset.id;
              if (!confirm(`確定要刪除這筆紀錄嗎？雲端也會同步刪除喔。`)) return;

              const deletePayload = { action: 'DELETE', id: entryId };
              const success = await sendActionToSheet(deletePayload);

              if (success) {
                  entries = entries.filter((e) => e.id !== entryId);
                  saveEntries();
                  render();
              } 
          };
      });
    }

    function renderBudgetInputs() {
      budgetInputs.innerHTML = "";
      Object.keys(categoryData).forEach((cat) => {
        const row = document.createElement("div");
        row.className = "flex justify-between items-center";
        row.innerHTML = `
          <span class="text-sm">${cat}</span>
          <input class="w-24 px-2 py-1 rounded-lg border border-slate-300 text-sm focus:outline-pastel" type="number" data-cat="${cat}" value="${categoryBudgets[cat] || ""}"/>
        `;
        budgetInputs.appendChild(row);
      });
    }

    saveBudgetBtn.onclick = () => {
      const inputs = budgetInputs.querySelectorAll("input");
      inputs.forEach((i) => { categoryBudgets[i.dataset.cat] = Number(i.value || 0); });
      saveCategoryBudgets();
      alert("分類預算已順利更新 ✓");
    };

    budgetBtn.onclick = () => {
      const isOpen = !budgetContent.classList.contains("hidden");
      budgetContent.classList.toggle("hidden");
      budgetArrow.textContent = isOpen ? "▼" : "▲";
    };

    monthFilter.onchange = render;

    function renderExpensePieChart(list) {
      const expenses = list.filter((e) => e.type === "expense");
      if (!expenses.length) {
        if (pieChart) { pieChart.destroy(); pieChart = null; }
        return;
      }
      const categoryMap = {};
      expenses.forEach((e) => {
        if (!categoryMap[e.mainCategory]) categoryMap[e.mainCategory] = 0;
        categoryMap[e.mainCategory] += e.amount;
      });

      const labels = Object.keys(categoryMap);
      const data = Object.values(categoryMap);
      const ctx = document.getElementById("expensePieChart");

      if (pieChart) pieChart.destroy();
      pieChart = new Chart(ctx, {
        type: "pie",
        data: {
          labels: labels,
          datasets: [{
            data: data,
            backgroundColor: ["#FFB7CE","#FF6C9F","#FFE3ED","#FFD1DC","#FFC7E3","#FF8FB2","#F9A8D4","#FBCFE8"],
            borderWidth: 1,
            borderColor: "#fff"
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { 
            legend: { 
              display: true, 
              position: "bottom", 
              labels: { 
                font: { size: 11 },
                padding: 12,
                boxWidth: 12
              } 
            } 
          }
        }
      });
    }

    /* =================彈窗邏輯================= */
    
    // 計算機
    const calcFab = document.getElementById('calcFab');
    const calcModal = document.getElementById('calcModal');
    const closeCalcBtn = document.getElementById('closeCalcBtn');
    
    calcFab.onclick = () => calcModal.classList.replace('hidden', 'flex');
    closeCalcBtn.onclick = () => calcModal.classList.replace('flex', 'hidden');

    // 筆記本
    const notesFab = document.getElementById('notesFab');
    const notesModal = document.getElementById('notesModal');
    const closeNotesBtn = document.getElementById('closeNotesBtn');
    
    notesFab.onclick = () => notesModal.classList.replace('hidden', 'flex');
    closeNotesBtn.onclick = () => notesModal.classList.replace('flex', 'hidden');

    // 計算機功能
    const calcDisplay = document.getElementById('calcDisplay');
    const calcHistory = document.getElementById('calcHistory');
    let currentInput = '0';
    let previousInput = '';
    let operator = null;

    document.getElementById('calcKeypad').addEventListener('click', (e) => {
      if(e.target.tagName !== 'BUTTON') return;
      const val = e.target.getAttribute('data-val');

      if (val >= '0' && val <= '9') {
        if (currentInput === '0') currentInput = val;
        else currentInput += val;
      } else if (val === '.') {
        if (!currentInput.includes('.')) currentInput += '.';
      } else if (val === 'C') {
        currentInput = '0'; previousInput = ''; operator = null; calcHistory.textContent = '';
      } else if (val === 'DEL') {
        currentInput = currentInput.slice(0, -1) || '0';
      } else if (['+', '-', '*', '/'].includes(val)) {
        if (operator && previousInput) {
          currentInput = String(calculate(previousInput, currentInput, operator));
        }
        operator = val;
        previousInput = currentInput;
        currentInput = '0';
        calcHistory.textContent = `${previousInput} ${val.replace('*','×').replace('/','÷')}`;
      } else if (val === '%') {
        currentInput = String(Number(currentInput) / 100);
      } else if (val === '=') {
        if (operator && previousInput) {
          calcHistory.textContent = `${previousInput} ${operator.replace('*','×').replace('/','÷')} ${currentInput} =`;
          currentInput = String(calculate(previousInput, currentInput, operator));
          operator = null;
          previousInput = '';
        }
      }
      
      calcDisplay.textContent = currentInput;
    });

    function calculate(num1, num2, op) {
      const n1 = parseFloat(num1);
      const n2 = parseFloat(num2);
      if(isNaN(n1) || isNaN(n2)) return 0;
      switch(op) {
        case '+': return n1 + n2;
        case '-': return n1 - n2;
        case '*': return n1 * n2;
        case '/': return n2 === 0 ? 'Error' : n1 / n2;
        default: return n2;
      }
    }

    init();

  </script>
</body>
</html>
