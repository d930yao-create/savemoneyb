<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>bowbow記帳本</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Zen Maru Gothic"', 'sans-serif'], 
          },
          colors: {
            milk: "#FAF8FF",          // 大背景：極淡粉紫
            cardBg: "#FFFFFF",        // 卡片：純白
            orangeSoft: "#F9F6FC",    // 輸入框底色：微透灰紫
            lavenderBorder: "#F0EAF5",// 邊框：淺灰紫
            macaronTeal: "#E0F2F1",   // 收入：薄荷綠
            macaronRose: "#FFEBEE",   // 支出：草莓粉
            macaronOrange: "#FFF3E0", // 儲蓄：杏桃橘
            navYellow: "#FFF9C4",     // 導覽列作用中
            rose: "#F48FB1",          // 強調色/金額：柔和玫瑰紅
            ink: "#4E342E",           // 文字：深可可棕
            happyOrange: "#FFB74D"    // 收入金額色
          },
          boxShadow: { 
            soft: "0 4px 15px 0 rgba(78, 52, 46, 0.03)", 
            float: "0 8px 25px rgba(244, 143, 177, 0.2)" 
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Zen Maru Gothic', sans-serif; }
    .page-content { display: none; height: 100%; }
    .page-content.active { display: flex; flex-direction: column; }
    
    .card-solid { background: #FFFFFF !important; border: 1px solid #F0EAF5; }

    .pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes popIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    button { -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .custom-checkbox { accent-color: #F48FB1; width: 20px; height: 20px; }
    .bill-done { text-decoration: line-through; color: #D7CCC8 !important; opacity: 0.6; }
    
    /* 調整字體大小：以備註(14px)為基礎，標題放大至20px，一般內容16px */
    .bill-input-name { background: transparent; border: none; width: 100%; font-size: 16px; color: #4E342E; outline: none; }
    .bill-input-amount { background: transparent; border: none; width: 90px; font-size: 16px; color: #F48FB1; outline: none; text-align: right; font-weight: 700; }
    
    .nav-active { background-color: #FFF9C4; opacity: 1 !important; transform: translateY(-2px); }
    
    #floatingCalc { 
        position: fixed; 
        bottom: 110px; 
        right: 20px; 
        z-index: 50; 
        width: 56px; 
        height: 56px; 
        border-radius: 28px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 28px; 
        cursor: pointer; 
        background-color: #FFF9C4; 
        box-shadow: 0 6px 20px rgba(244, 143, 177, 0.15); 
        transition: transform 0.2s; 
    }
    #floatingCalc:active { transform: scale(0.9); }

/* 計算機3D 糖果按鈕核心設定 */
.btn-3d {
  position: relative;
  border-radius: 20px; 
  font-weight: 700;
  font-size: 22px;
  transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 56px; 
}
.btn-3d:active {
  transform: translateY(4px); 
}

/* 數字鍵 (白底透亮) */
.btn-num {
  background: linear-gradient(180deg, #FFFFFF 0%, #FFF5F7 100%);
  color: #4E342E;
  box-shadow: 
    inset 0 3px 0 rgba(255,255,255,1), 
    inset 0 -5px 0 rgba(240, 234, 245, 1),
    0 5px 8px rgba(78, 52, 46, 0.08);
}
.btn-num:active { box-shadow: inset 0 2px 0 rgba(255,255,255,1), inset 0 -2px 0 rgba(240, 234, 245, 1), 0 2px 4px rgba(78, 52, 46, 0.08); }


/* 功能鍵 C, %, 退格 (檸檬卡士達黃) */
.btn-ctrl {
  background: linear-gradient(180deg, #FFFDE7 0%, #FFF59D 100%);
  color: #F57F17;
  box-shadow: 
    inset 0 3px 0 rgba(255, 255, 255, 0.9), 
    inset 0 -5px 0 rgba(255, 241, 118, 1),
    0 5px 8px rgba(255, 235, 59, 0.2);
}
.btn-ctrl:active { 
  box-shadow: 
    inset 0 2px 0 rgba(255, 255, 255, 0.9), 
    inset 0 -2px 0 rgba(255, 241, 118, 1), 
    0 2px 4px rgba(255, 235, 59, 0.2); 
}

/* 運算鍵 +, -, *, / (草莓軟糖) */
.btn-op {
  background: linear-gradient(180deg, #FFECEC 0%, #FFD2D2 100%);
  color: #D32F2F;
  box-shadow: 
    inset 0 3px 0 rgba(255,255,255,0.8), 
    inset 0 -5px 0 rgba(239, 154, 154, 1),
    0 5px 8px rgba(239, 154, 154, 0.3);
}
.btn-op:active { box-shadow: inset 0 2px 0 rgba(255,255,255,0.8), inset 0 -2px 0 rgba(239, 154, 154, 1), 0 2px 4px rgba(239, 154, 154, 0.3); }

/* 確認鍵 = (立體玫瑰) */
.btn-eq {
  background: linear-gradient(180deg, #F48FB1 0%, #E91E63 100%);
  color: #FFFFFF;
  box-shadow: 
    inset 0 3px 0 rgba(255,255,255,0.4), 
    inset 0 -5px 0 rgba(194, 24, 91, 1),
    0 5px 12px rgba(233, 30, 99, 0.3);
}
.btn-eq:active { box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), inset 0 -2px 0 rgba(194, 24, 91, 1), 0 2px 4px rgba(233, 30, 99, 0.3); }
/* 計算機3D 糖果按鈕核心設定結尾 */

  </style>
</head>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-xl bg-cardBg border-t border-lavenderBorder rounded-t-[32px] pb-6 pt-3 px-8 flex justify-between z-40 shadow-soft">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const categoryData = {
      expense: {
        "🍱 飲食":["早餐","午餐","晚餐","點心","宵夜","小吃","飲料","其他"],
        "🚗 交通":["大眾運輸","加油","Uber／計程車","停車費","其他"],
        "🛒 生活":["個人用品","家庭用品","生活用品","文具小物","五金工具","其他"],
        "🛍️ 購物":["衣服","鞋子","配件","美妝","其他"],
        "💳 帳單":["卡費","手機費","健保費","房租","電費","水費","網路","其他"],
        "🐱 貓咪":["罐頭","乾乾","零食","貓砂","玩具","醫療","用品","其他"],
        "💖 美容":["美甲","美睫","保養","美髮","保養品","其他"],
        "🎮 娛樂":["電影","KTV","遊戲","聚會","網咖","其他"],
        "🏥 醫療":["看診","藥品","健康檢查","其他醫療"],
        "✈️ 旅遊":["住宿","交通","門票","伴手禮","其他"],
        "🎀 其他":["臨時開銷","小額花費","收支平衡","其他"]
      },
      income: ["💰 薪水", "🎁 獎金", "📈 投資", "👾 遊戲", "🧧 其他"],
      saving: ["🐷 存錢", "🎯 基金", "📈 股票", "💖 其他"]
    };

    const STORAGE_KEY = "cute-book-entries-v3", FIXED_BILLS_KEY = "cute-fixed-bills-v4";
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyePbfCt3HsLD-cKRqZfREIsB07FGiecvFiPiXpGMVHWAdC0_JgmOW0OzvRXlzXqFV4/exec';
    
    const chartColors = ['#F0EAF5', '#E0F2F1', '#FFF3E0', '#FFEBEE', '#F48FB1', '#FFF9C4', '#D7CCC8'];

    let entries = [], fixedBills = [], selectedType = null, selectedMainCategory = null, selectedSubCategory = null, pieChart = null;

    function getTaiwanTime() {
      const d = new Date();
      const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
      return new Date(utc + (3600000 * 8));
    }

    function openCalc() { document.getElementById('calcModal').classList.replace('hidden','flex'); }
    function closeCalc() { document.getElementById('calcModal').classList.replace('flex','hidden'); }

    function switchTab(tabName) {
      document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + tabName).classList.add('active');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
      document.getElementById('nav' + tabName).classList.add('nav-active');
      if(tabName === 'Chart') renderPieChart(entries.filter(e => e.date && e.date.startsWith(document.getElementById("monthFilter").value)));
    }

    async function init() {
      const twTime = getTaiwanTime();
      document.getElementById("monthFilter").value = `${twTime.getFullYear()}-${String(twTime.getMonth()+1).padStart(2,"0")}`;
      document.getElementById("dateInput").value = twTime.toISOString().split('T')[0];
      
      entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      fixedBills = JSON.parse(localStorage.getItem(FIXED_BILLS_KEY) || "[]");
      render(); renderFixedBills();
      await loadDataFromSheet();
      setInterval(loadDataFromSheet, 60000); 
    }

    async function loadDataFromSheet() {
      try {
        const res = await fetch(SCRIPT_URL);
        const result = await res.json();
        if (result.status === 'success') {
          const cloudData = result.data.map(e => ({...e, amount: parseFloat(e.amount), date: (e.date||'').split('T')[0]}));
          const localOnly = entries.filter(local => !cloudData.find(cloud => cloud.id === local.id));
          entries = [...cloudData, ...localOnly].sort((a,b) => b.date.localeCompare(a.date));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); 
          render();
        }
      } catch(e){}
    }

    function render() {
      const currentMonth = document.getElementById("monthFilter").value;
      const list = entries.filter(e => e.date && e.date.startsWith(currentMonth)).sort((a,b) => b.date.localeCompare(a.date));
      let inc=0, exp=0, sav=0;
      list.forEach(e => { if(e.type==='income') inc+=e.amount; if(e.type==='expense') exp+=e.amount; if(e.type==='saving') sav+=e.amount; });
      
      document.getElementById("sumIncome").textContent = "$"+inc.toLocaleString();
      document.getElementById("sumExpense").textContent = "$"+exp.toLocaleString();
      document.getElementById("sumSaving").textContent = "$"+sav.toLocaleString();
      document.getElementById("sumBalance").textContent = "$"+(inc - exp - sav).toLocaleString();
      document.getElementById("recordCount").textContent = `共 ${list.length} 筆`;
      
      const listEl = document.getElementById("mobileList");
      listEl.innerHTML = "";
      document.getElementById("emptyHint").classList.toggle("hidden", list.length > 0);
      
      list.forEach(e => {
        const card = document.createElement("div"); 
        card.className = "bg-white border border-lavenderBorder rounded-2xl p-4 shadow-sm mb-3";
        
        let badgeStr = "", amountColor = "text-ink font-bold text-[16px]"; 
        
        if (e.type === 'income') {
            badgeStr = '<span class="px-3 py-1.5 rounded-lg text-[14px] bg-macaronTeal text-ink font-medium">收入</span>';
            amountColor = "text-happyOrange font-bold text-[16px]"; 
        } else if (e.type === 'saving') {
            badgeStr = '<span class="px-3 py-1.5 rounded-lg text-[14px] bg-macaronOrange text-ink font-medium">儲蓄</span>';
        } else {
            badgeStr = '<span class="px-3 py-1.5 rounded-lg text-[14px] bg-macaronRose text-ink font-medium">支出</span>';
            amountColor = "text-rose font-bold text-[16px]"; 
        }
        
        const catText = e.subCategory ? `${e.mainCategory} · ${e.subCategory}` : (e.mainCategory || '');
        
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              ${badgeStr} 
              <span class="font-bold text-ink ml-2 text-[16px]">${catText}</span>
              <p class="text-[14px] text-ink/60 mt-2 font-medium">${e.date} ${e.note ? '| '+e.note : ''}</p>
            </div>
            <div class="text-right">
              <p class="${amountColor}">$${e.amount.toLocaleString()}</p>
              <button onclick="deleteEntry('${e.id}')" class="text-[14px] text-ink/40 mt-1 hover:text-rose font-medium">刪除</button>
            </div>
          </div>
        `;
        listEl.appendChild(card);
      });
    }

    function setupForm(type) {
      selectedType = type;
      selectedMainCategory = null; selectedSubCategory = null;
      document.getElementById("expenseCategoryBlock").classList.toggle("hidden", false); 
      
      ['btnIncome', 'btnExpense', 'btnSaving'].forEach(id => {
        const btn = document.getElementById(id);
        btn.className = "py-4 rounded-2xl bg-orangeSoft text-[16px] font-medium text-ink/60 transition-colors";
      });
      
      const activeBtn = document.getElementById(type==='income'?'btnIncome':(type==='expense'?'btnExpense':'btnSaving'));
      
      if(type === 'income') activeBtn.className = "py-4 rounded-2xl bg-macaronTeal text-[16px] font-bold text-ink transition-colors shadow-sm";
      if(type === 'expense') activeBtn.className = "py-4 rounded-2xl bg-macaronRose text-[16px] font-bold text-ink transition-colors shadow-sm";
      if(type === 'saving') activeBtn.className = "py-4 rounded-2xl bg-macaronOrange text-[16px] font-bold text-ink transition-colors shadow-sm";
      
      renderCategories();
    }

    function renderCategories() {
      const box = document.getElementById("mainCategoryButtons"); box.innerHTML = "";
      const subBox = document.getElementById("subCategoryButtons"); subBox.innerHTML = ""; subBox.classList.add("hidden");
      
      const currentData = categoryData[selectedType];
      const isArray = Array.isArray(currentData);
      const keys = isArray ? currentData : Object.keys(currentData);
      
      keys.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "py-3 px-1 bg-orangeSoft text-ink/70 rounded-xl text-[14px] font-medium border border-transparent truncate transition-colors";
        btn.textContent = cat;
        btn.onclick = (ev) => {
          ev.preventDefault(); selectedMainCategory = cat;
          
          if(!isArray && currentData[cat].length > 0) {
              selectedSubCategory = currentData[cat][0];
              renderSubCategories(cat);
          } else {
              selectedSubCategory = null;
              subBox.classList.add("hidden");
          }
          
          Array.from(box.children).forEach(b => b.className = "py-3 px-1 bg-orangeSoft text-ink/70 rounded-xl text-[14px] font-medium border border-transparent truncate transition-colors");
          
          const activeColor = selectedType === 'income' ? 'bg-macaronTeal' : (selectedType === 'saving' ? 'bg-macaronOrange' : 'bg-macaronRose');
          btn.className = `py-3 px-1 ${activeColor} text-ink rounded-xl text-[14px] font-bold border border-transparent truncate transition-colors shadow-sm`;
        };
        box.appendChild(btn);
      });
    }

    function renderSubCategories(mainCat) {
      const subBox = document.getElementById("subCategoryButtons"); subBox.innerHTML = ""; 
      const currentData = categoryData[selectedType][mainCat];
      if(!currentData || currentData.length === 0) { subBox.classList.add("hidden"); return; }
      subBox.classList.remove("hidden");
      
      currentData.forEach(sub => {
        const btn = document.createElement("button");
        btn.className = "py-3 px-1 bg-orangeSoft text-ink/70 rounded-xl text-[14px] font-medium border border-transparent truncate transition-colors";
        btn.textContent = sub;
        btn.onclick = (ev) => {
          ev.preventDefault(); selectedSubCategory = sub;
          Array.from(subBox.children).forEach(b => b.className = "py-3 px-1 bg-orangeSoft text-ink/70 rounded-xl text-[14px] font-medium border border-transparent truncate transition-colors");
          btn.className = `py-3 px-1 bg-macaronRose text-ink rounded-xl text-[14px] font-bold border border-transparent truncate transition-colors shadow-sm`;
        };
        subBox.appendChild(btn);
      });
    }

    document.getElementById("entryForm").onsubmit = async (e) => {
      e.preventDefault(); 
      const amt = Number(document.getElementById("amountInput").value);
      if (!amt || !selectedType || !selectedMainCategory) {
          alert('請確保金額與分類都有填寫喔');
          return;
      }
      const entry = { id: Date.now().toString(), type: selectedType, amount: amt, date: document.getElementById("dateInput").value, note: document.getElementById("noteInput").value, mainCategory: selectedMainCategory, subCategory: selectedSubCategory || '' };
      entries.unshift(entry); localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render(); switchTab('Home'); 
      document.getElementById("amountInput").value = ""; document.getElementById("noteInput").value = "";
      try { await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(entry) }); await loadDataFromSheet(); } catch(err) {}
    };

    window.deleteEntry = async (id) => {
      if(!confirm("確定要刪除這筆紀錄嗎？")) return;
      entries = entries.filter(e => e.id !== id); localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render();
      try { await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'DELETE', id: id }) }); } catch(err) {}
    };

    function updateBillSummary() {
        let total = 0;
        fixedBills.forEach(b => { if (b.amount && !b.done) { const val = parseFloat(b.amount); if (!isNaN(val)) total += val; }});
        document.getElementById("billTotalDisplay").textContent = "$" + total.toLocaleString();
    }

    function renderFixedBills() {
      const billListEl = document.getElementById("billList");
      billListEl.innerHTML = "";
      if (fixedBills.length === 0) { 
          billListEl.innerHTML = `<p class="text-[14px] text-ink/40 text-center py-12 font-medium">目前沒有待繳項目 ✨</p>`; 
          updateBillSummary(); return; 
      }
      fixedBills.forEach((b, i) => {
        const div = document.createElement("div");
        div.className = "flex items-center gap-3 py-3 border-b border-lavenderBorder px-2";
        div.innerHTML = `
          <input type="checkbox" class="custom-checkbox flex-shrink-0" ${b.done ? "checked" : ""} onchange="checkBill(${i})" />
          <div class="flex-1 flex items-center bg-orangeSoft rounded-xl px-4 py-3">
            <input type="text" class="bill-input-name font-medium ${b.done ? 'bill-done' : ''}" value="${b.name || ''}" onblur="updateBill(${i}, 'name', this.value)" placeholder="內容..." />
            <span class="text-ink/20 mx-2">|</span>
            <input type="number" inputmode="decimal" class="bill-input-amount ${b.done ? 'bill-done' : ''}" value="${b.amount || ''}" onblur="updateBill(${i}, 'amount', this.value)" placeholder="0" />
          </div>
          <button onclick="deleteBill(${i})" class="text-[14px] text-ink/40 font-medium px-1 flex-shrink-0 hover:text-rose">刪除</button>
        `;
        billListEl.appendChild(div);
      });
      updateBillSummary();
    }

    window.updateBill = (i, field, val) => { 
      fixedBills[i][field] = val; 
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); 
      if (field === 'amount') renderFixedBills();
    };

    document.getElementById("addBillBtn").onclick = () => {
      fixedBills.push({ name: "", amount: "", done: false });
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills();
      const inputs = document.getElementById("billList").querySelectorAll('.bill-input-name');
      if(inputs.length > 0) inputs[inputs.length - 1].focus();
    };

    window.checkBill = (i) => { 
      const bill = fixedBills[i];
      if (!bill.done) {
          if (confirm("這筆費用要直接轉入正式支出明細嗎？")) {
              const amt = parseFloat(bill.amount);
              if (!isNaN(amt) && amt > 0) {
                  const entry = {
                      id: Date.now().toString(),
                      type: 'expense',
                      amount: amt,
                      date: document.getElementById("dateInput").value,
                      note: bill.name,
                      mainCategory: "💳 帳單",
                      subCategory: "其他"
                  };
                  entries.unshift(entry);
                  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
                  fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(entry) }).catch(err => {});
                  render();
              }
          }
      }
      fixedBills[i].done = !fixedBills[i].done; 
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); 
      renderFixedBills(); 
    };

    window.deleteBill = (i) => { if (confirm("確定刪除？")) { fixedBills.splice(i, 1); localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills(); } };

    function renderPieChart(list) {
      const ctx = document.getElementById("expensePieChart");
      const data = {}; list.filter(e => e.type==='expense').forEach(e => { if(e.mainCategory) data[e.mainCategory] = (data[e.mainCategory]||0) + e.amount; });
      if(pieChart) pieChart.destroy();
      pieChart = new Chart(ctx, { type:'pie', data: { labels:Object.keys(data), datasets:[{ data:Object.values(data), backgroundColor: chartColors }] }, options: { plugins: { legend: { position:'bottom', labels: { font:{size:14, family: "'Zen Maru Gothic', sans-serif"}, color: '#4E342E' } } } } });
    }

    function safeCalculate(expression) {
        if(!expression) return "";
        let str = expression.toString().replace(/×/g, '*').replace(/÷/g, '/');
        try { const result = new Function('return ' + str)(); return (!isFinite(result) || isNaN(result)) ? expression : String(result); } catch(e) { return expression; }
    }

    document.getElementById("calcKeypad").onclick = (e) => {
      const v = e.target.dataset.val; if(!v) return;
      let display = document.getElementById("calcDisplay");
      if(v === 'C') display.textContent = '0';
      else if (v === 'DEL') display.textContent = display.textContent.length > 1 ? display.textContent.slice(0, -1) : '0';
      else if(v === '=') display.textContent = safeCalculate(display.textContent);
      else display.textContent = (display.textContent === '0' && !['+', '-', '*', '/'].includes(v)) ? v : display.textContent + v;
    };

    document.getElementById("btnIncome").onclick = () => setupForm('income');
    document.getElementById("btnExpense").onclick = () => setupForm('expense');
    document.getElementById("btnSaving").onclick = () => setupForm('saving');
    document.getElementById("monthFilter").onchange = render;

    init();
    setupForm('expense');
  </script>
</body>
</html>
