<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>bowbow記帳本</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Zen Maru Gothic"', 'sans-serif'], 
          },
          colors: {
            milk: "#FFFDFB",        
            macaronTeal: "#B2DFDB", 
            macaronRose: "#f5ccde", 
            macaronOrange: "#FFD180", 
            macaronPeach: "#FFCCBC",  
            navYellow: "#FFF9C4",   
            rose: "#FF4D8D",        
            ink: "#3D3D3D",
            happyOrange: "#FF9800"  // 新增：專屬收入的快樂亮橘色
          },
          boxShadow: { 
            soft: "0 4px 15px 0 rgba(0,0,0,0.03)", 
            float: "0 8px 25px rgba(255, 204, 188, 0.4)" 
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Zen Maru Gothic', sans-serif; }
    .page-content { display: none; height: 100%; }
    .page-content.active { display: flex; flex-direction: column; }
    
    .card-solid { background: #FFFFFF !important; border: 1px solid #FFF0F6; }

    .slide-up-drawer { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    button { -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .custom-checkbox { accent-color: #FF4D8D; width: 18px; height: 18px; }
    .bill-done { text-decoration: line-through; color: #D1D1D1 !important; opacity: 0.6; }
    
    .bill-input-name { background: transparent; border: none; width: 100%; font-size: 16px; color: #3D3D3D; outline: none; }
    .bill-input-amount { background: transparent; border: none; width: 80px; font-size: 16px; color: #FF4D8D; outline: none; text-align: right; font-weight: 700; }
    
    .nav-active { background-color: #FFF9C4; opacity: 1 !important; transform: translateY(-2px); }
    
    #floatingCalc { position: fixed; bottom: 115px; right: 20px; z-index: 50; width: 56px; height: 56px; border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; transition: transform 0.2s; }
    #floatingCalc:active { transform: scale(0.9); }
  </style>
</head>

<body class="bg-milk text-ink h-screen overflow-hidden relative">
  
  <div id="floatingCalc" class="bg-macaronOrange shadow-float" onclick="openCalc()">🐥</div>

  <div class="max-w-xl mx-auto px-4 py-6 h-full flex flex-col">
    <div id="pageHome" class="page-content active">
      <section class="card-solid rounded-[32px] p-5 flex-shrink-0 shadow-soft mb-4">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-lg font-bold text-ink">✨ 本月總覽</h1>
          <input id="monthFilter" type="month" class="px-3 py-1 bg-gray-50 rounded-xl border border-gray-100 text-xs text-ink outline-none appearance-none font-medium" />
        </div>
        
        <div class="flex justify-between items-center gap-2 mb-4">
          <div class="text-center w-1/3 bg-macaronTeal rounded-2xl p-3">
            <p class="text-[10px] text-ink/70 mb-1 font-bold">收入</p>
            <p id="sumIncome" class="text-sm font-bold text-ink">$0</p>
          </div>
          <div class="text-center w-1/3 bg-macaronRose rounded-2xl p-3">
            <p class="text-[10px] text-ink/70 mb-1 font-bold">支出</p>
            <p id="sumExpense" class="text-sm font-bold text-ink">$0</p>
          </div>
          <div class="text-center w-1/3 bg-macaronOrange rounded-2xl p-3">
            <p class="text-[10px] text-ink/70 mb-1 font-bold">儲蓄</p>
            <p id="sumSaving" class="text-sm font-bold text-ink">$0</p>
          </div>
        </div>
        
        <div class="bg-macaronPeach rounded-2xl p-4 flex justify-between items-center">
          <div class="flex flex-col"><span class="text-xs text-ink font-bold">可用現金</span><span class="text-[9px] text-ink/60 font-medium">已扣除支出與儲蓄</span></div>
          <span id="sumBalance" class="text-xl font-bold text-ink">$0</span>
        </div>
      </section>
      
      <section class="card-solid rounded-[32px] p-4 flex-grow flex flex-col overflow-hidden shadow-soft mb-4">
        <div class="flex justify-between items-center mb-3 px-1">
          <h2 class="text-sm font-bold text-ink">📋 明細清單</h2>
          <span id="recordCount" class="text-xs text-ink/50 font-medium"></span>
        </div>
        <div id="mobileList" class="space-y-2 overflow-y-auto hide-scrollbar pb-32"></div>
        <p id="emptyHint" class="text-xs text-ink/30 mt-10 hidden text-center font-medium">目前沒有紀錄。</p>
      </section>
    </div>

    <div id="pageNotes" class="page-content">
      <div class="flex justify-between items-center mb-6 px-2">
          <h3 class="text-lg font-bold text-rose">📒 待繳清單</h3>
          <div class="bg-macaronPeach px-4 py-2 rounded-2xl flex flex-col items-end">
              <span class="text-[9px] text-ink/70 font-bold tracking-tighter">待繳總計</span>
              <span id="billTotalDisplay" class="text-md font-bold text-ink">$0</span>
          </div>
      </div>
      <div class="card-solid rounded-[32px] p-5 shadow-soft flex-grow flex flex-col overflow-hidden mb-4">
        <div class="flex px-10 mb-2 text-[10px] text-ink/40 font-bold">
            <span class="flex-1">項目名稱</span>
            <span class="w-[80px] text-right">預計金額</span>
        </div>
        <div id="billList" class="overflow-y-auto hide-scrollbar space-y-1 mb-4 px-1 pb-32"></div>
        <button id="addBillBtn" class="w-full py-4 border-2 border-dashed border-macaronPeach text-ink/50 rounded-[20px] text-sm font-bold bg-white active:bg-gray-50 transition-colors mt-auto">＋ 新增一列項目</button>
      </div>
    </div>
    
    <div id="pageChart" class="page-content">
      <h3 class="text-lg font-bold text-ink mb-6 px-2">📊 分類統計</h3>
      <div class="card-solid rounded-[32px] p-6 shadow-soft">
        <div class="h-[300px] flex items-center justify-center">
          <canvas id="expensePieChart"></canvas>
        </div>
      </div>
    </div>

    <div id="pageAdd" class="page-content">
      <h3 class="text-lg font-bold text-rose mb-6 px-2">🍓 新增記錄</h3>
      <div class="card-solid rounded-[32px] p-6 shadow-soft space-y-6">
        <div class="grid grid-cols-3 gap-3">
          <button id="btnIncome" class="py-3 rounded-2xl bg-macaronTeal/30 text-sm font-bold text-ink transition-colors">💗 收入</button>
          <button id="btnExpense" class="py-3 rounded-2xl bg-macaronRose text-sm font-bold text-ink transition-colors shadow-sm">🧾 支出</button>
          <button id="btnSaving" class="py-3 rounded-2xl bg-macaronOrange/30 text-sm font-bold text-ink transition-colors">🐷 儲蓄</button>
        </div>
        <form id="entryForm" class="space-y-5">
          <div class="flex flex-col gap-4">
            <input id="amountInput" type="number" inputmode="decimal" class="box-border w-full bg-gray-50 px-5 py-4 rounded-[20px] border-none text-[20px] font-bold text-rose outline-none focus:bg-macaronRose/20 transition-all" placeholder="輸入金額" />
            <input id="dateInput" type="date" class="box-border w-full bg-gray-50 px-5 py-4 rounded-[20px] border-none text-[16px] text-ink font-medium outline-none focus:bg-macaronRose/20 appearance-none" />
          </div>
          <div id="expenseCategoryBlock" class="hidden space-y-4">
            <div id="mainCategoryButtons" class="grid grid-cols-4 gap-2 text-xs"></div>
            <div id="subCategoryButtons" class="grid grid-cols-4 gap-2 text-xs hidden pt-4 border-t border-gray-100"></div>
          </div>
          <input id="noteInput" type="text" class="box-border w-full bg-gray-50 px-5 py-4 rounded-[20px] border-none text-[16px] font-medium text-ink outline-none focus:bg-macaronRose/20 transition-all" placeholder="備註 (可留白)" />
          
          <button type="submit" class="w-full py-4 bg-rose text-white rounded-[20px] text-md shadow-float font-bold active:scale-95 transition-transform">＋ 加入紀錄</button>
        </form>
      </div>
    </div>
  </div>

  <div id="calcModal" class="fixed inset-0 bg-ink/40 z-[60] hidden flex-col justify-end backdrop-blur-sm" onclick="if(event.target==this) closeCalc()">
    <div class="bg-white w-full max-w-xl mx-auto rounded-t-[40px] p-6 pb-12 shadow-2xl slide-up-drawer" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-ink flex items-center gap-2">🌸 計算機</h3><button onclick="closeCalc()" class="text-gray-300 text-3xl">&times;</button></div>
      <div class="bg-macaronPeach/30 rounded-[24px] p-6 mb-6 text-right">
        <div id="calcHistory" class="text-[10px] text-ink/50 min-h-[16px] mb-1 font-medium"></div>
        <div id="calcDisplay" class="text-4xl font-bold text-rose truncate">0</div>
      </div>
      <div class="grid grid-cols-4 gap-3" id="calcKeypad">
        <button class="bg-gray-100 text-ink py-5 rounded-2xl text-xl font-bold" data-val="C">C</button>
        <button class="bg-gray-100 text-ink py-5 rounded-2xl text-xl font-bold" data-val="DEL">⌫</button>
        <button class="bg-gray-100 text-ink py-5 rounded-2xl text-xl font-bold" data-val="%">%</button>
        <button class="bg-macaronPeach text-ink py-5 rounded-2xl text-xl font-bold" data-val="/">÷</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="7">7</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="8">8</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="9">9</button>
        <button class="bg-macaronPeach text-ink py-5 rounded-2xl text-xl font-bold" data-val="*">×</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="4">4</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="5">5</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="6">6</button>
        <button class="bg-macaronPeach text-ink py-5 rounded-2xl text-xl font-bold" data-val="-">-</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="1">1</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="2">2</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val="3">3</button>
        <button class="bg-macaronPeach text-ink py-5 rounded-2xl text-xl font-bold" data-val="+">+</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm col-span-2 font-bold" data-val="0">0</button>
        <button class="bg-white text-ink border border-gray-100 py-5 rounded-2xl text-xl shadow-sm font-bold" data-val=".">.</button>
        <button class="bg-rose text-white py-5 rounded-2xl text-xl shadow-float font-bold" data-val="=">=</button>
      </div>
    </div>
  </div>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-xl bg-white border-t border-gray-100 rounded-t-[40px] pb-8 pt-3 px-10 flex justify-between z-40 shadow-soft">
    <button onclick="switchTab('Home')" id="navHome" class="flex flex-col items-center p-3 rounded-2xl transition-all nav-active"><span class="text-2xl drop-shadow-sm">🏠</span></button>
    <button onclick="switchTab('Chart')" id="navChart" class="flex flex-col items-center p-3 rounded-2xl transition-all"><span class="text-2xl drop-shadow-sm">🍪</span></button>
    <button onclick="switchTab('Add')" id="navAdd" class="flex flex-col items-center p-3 rounded-2xl transition-all"><span class="text-2xl drop-shadow-sm">✏️</span></button>
    <button onclick="switchTab('Notes')" id="navNotes" class="flex flex-col items-center p-3 rounded-2xl transition-all"><span class="text-2xl drop-shadow-sm">📒</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const categoryData = {"🍱 飲食":["早餐","午餐","晚餐","點心","宵夜","小吃","飲料","其他"],"🚗 交通":["大眾運輸","加油","Uber／計程車","停車費","其他"],"🛒 生活":["個人用品","家庭用品","生活用品","文具小物","五金工具","其他"],"🛍️ 購物":["衣服","鞋子","配件","美妝","其他"],"💳 帳單":["卡費","手機費","健保費","房租","電費","水費","網路","其他"],"🐱 貓咪":["罐頭","乾乾","零食","貓砂","玩具","醫療","用品","其他"],"💖 美容":["美甲","美睫","保養","美髮","保養品","其他"],"🎮 娛樂":["電影","KTV","遊戲","聚會","網咖","其他"],"🏥 醫療":["看診","藥品","健康檢查","其他醫療"],"✈️ 旅遊":["住宿","交通","門票","伴手禮","其他"],"🎀 其他":["臨時開銷","小額花費","收支平衡","其他"]};
    const STORAGE_KEY = "cute-book-entries-v2", FIXED_BILLS_KEY = "cute-fixed-bills-v3";
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyePbfCt3HsLD-cKRqZfREIsB07FGiecvFiPiXpGMVHWAdC0_JgmOW0OzvRXlzXqFV4/exec';
    
    const chartColors = ['#f5ccde', '#B2DFDB', '#FFD180', '#FFCCBC', '#FF4D8D', '#FFE3EE', '#F9E5DC', '#CDEAE7'];

    let entries = [], fixedBills = [], selectedType = null, selectedMainCategory = null, selectedSubCategory = null, pieChart = null;

    function openCalc() { document.getElementById('calcModal').classList.replace('hidden','flex'); }
    function closeCalc() { document.getElementById('calcModal').classList.replace('flex','hidden'); }

    function switchTab(tabName) {
      document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + tabName).classList.add('active');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
      document.getElementById('nav' + tabName).classList.add('nav-active');
      if(tabName === 'Chart') renderPieChart(entries.filter(e => e.date && e.date.startsWith(document.getElementById("monthFilter").value)));
    }

    async function init() {
      const t = new Date(); document.getElementById("monthFilter").value = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`;
      document.getElementById("dateInput").value = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
      entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      fixedBills = JSON.parse(localStorage.getItem(FIXED_BILLS_KEY) || "[]");
      render(); renderFixedBills();
      await loadDataFromSheet();
      setInterval(loadDataFromSheet, 60000); 
    }

    async function loadDataFromSheet() {
      try {
        const res = await fetch(SCRIPT_URL);
        const result = await res.json();
        if (result.status === 'success') {
          const cloudData = result.data.map(e => ({...e, amount: parseFloat(e.amount), date: (e.date||'').split('T')[0]}));
          const localOnly = entries.filter(local => !cloudData.find(cloud => cloud.id === local.id));
          entries = [...cloudData, ...localOnly].sort((a,b) => b.date.localeCompare(a.date));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); 
          render();
        }
      } catch(e){}
    }

    function render() {
      const currentMonth = document.getElementById("monthFilter").value;
      const list = entries.filter(e => e.date && e.date.startsWith(currentMonth)).sort((a,b) => b.date.localeCompare(a.date));
      let inc=0, exp=0, sav=0;
      list.forEach(e => { if(e.type==='income') inc+=e.amount; if(e.type==='expense') exp+=e.amount; if(e.type==='saving') sav+=e.amount; });
      document.getElementById("sumIncome").textContent = "$"+inc.toLocaleString();
      document.getElementById("sumExpense").textContent = "$"+exp.toLocaleString();
      document.getElementById("sumSaving").textContent = "$"+sav.toLocaleString();
      document.getElementById("sumBalance").textContent = "$"+(inc - exp - sav).toLocaleString();
      document.getElementById("recordCount").textContent = `共 ${list.length} 筆`;
      
      const listEl = document.getElementById("mobileList");
      listEl.innerHTML = "";
      document.getElementById("emptyHint").classList.toggle("hidden", list.length > 0);
      list.forEach(e => {
        const card = document.createElement("div"); 
        card.className = "bg-white border border-gray-100 rounded-2xl p-3 shadow-sm mb-3"; // 增加一點下邊距
        
        let badgeStr = "";
        // 預設字體大小設定為 18px，讓數字更清楚
        let amountColor = "text-ink font-bold text-[18px]"; 
        
        // 針對不同類型設定專屬顏色與標籤
        if (e.type === 'income') {
            badgeStr = '<span class="px-2.5 py-1 rounded-md text-[11px] bg-macaronTeal text-ink font-bold">收入</span>';
            amountColor = "text-happyOrange font-bold text-[18px]"; // 收入專屬亮橘色
        } else if (e.type === 'saving') {
            badgeStr = '<span class="px-2.5 py-1 rounded-md text-[11px] bg-macaronOrange text-ink font-bold">儲蓄</span>';
            amountColor = "text-ink font-bold text-[18px]"; // 儲蓄維持深灰
        } else {
            badgeStr = '<span class="px-2.5 py-1 rounded-md text-[11px] bg-macaronRose text-ink font-bold">支出</span>';
            amountColor = "text-rose font-bold text-[18px]"; // 支出維持亮粉色
        }
        
        // 放大分類字體 (16px) 與 日期備註字體 (12px)
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              ${badgeStr} 
              <span class="font-bold text-ink ml-2 text-[16px]">${e.mainCategory||''} ${e.subCategory||''}</span>
              <p class="text-[12px] text-ink/50 mt-1.5 font-medium">${e.date} ${e.note ? '· '+e.note : ''}</p>
            </div>
            <div class="text-right">
              <p class="${amountColor}">$${e.amount.toLocaleString()}</p>
              <button onclick="deleteEntry('${e.id}')" class="text-[11px] text-ink/30 mt-1 hover:text-rose font-bold">刪除</button>
            </div>
          </div>
        `;
        listEl.appendChild(card);
      });
    }

    function setupForm(type) {
      selectedType = type;
      document.getElementById("expenseCategoryBlock").classList.toggle("hidden", type !== 'expense');
      ['btnIncome', 'btnExpense', 'btnSaving'].forEach(id => {
        const btn = document.getElementById(id);
        btn.className = "py-3 rounded-2xl bg-gray-50 text-sm font-bold text-ink/50 transition-colors";
      });
      const activeBtn = document.getElementById(type==='income'?'btnIncome':(type==='expense'?'btnExpense':'btnSaving'));
      
      if(type === 'income') activeBtn.className = "py-3 rounded-2xl bg-macaronTeal text-sm font-bold text-ink transition-colors shadow-sm";
      if(type === 'expense') activeBtn.className = "py-3 rounded-2xl bg-macaronRose text-sm font-bold text-ink transition-colors shadow-sm";
      if(type === 'saving') activeBtn.className = "py-3 rounded-2xl bg-macaronOrange text-sm font-bold text-ink transition-colors shadow-sm";
      
      if(type === 'expense') renderCategories();
    }

    function renderCategories() {
      const box = document.getElementById("mainCategoryButtons"); box.innerHTML = "";
      Object.keys(categoryData).forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "py-2 px-1 bg-gray-50 text-ink/70 rounded-xl text-[11px] font-bold border border-transparent truncate transition-colors";
        btn.textContent = cat;
        btn.onclick = (ev) => {
          ev.preventDefault(); selectedMainCategory = cat; selectedSubCategory = categoryData[cat][0];
          Array.from(box.children).forEach(b => b.className = "py-2 px-1 bg-gray-50 text-ink/70 rounded-xl text-[11px] font-bold border border-transparent truncate transition-colors");
          btn.className = "py-2 px-1 bg-macaronRose text-ink rounded-xl text-[11px] font-bold border border-transparent truncate transition-colors shadow-sm";
          renderSubCategories(cat);
        };
        box.appendChild(btn);
      });
    }

    function renderSubCategories(mainCat) {
      const subBox = document.getElementById("subCategoryButtons"); subBox.innerHTML = ""; subBox.classList.remove("hidden");
      categoryData[mainCat].forEach(sub => {
        const btn = document.createElement("button");
        btn.className = "py-2 px-1 bg-gray-50 text-ink/70 rounded-xl text-[11px] font-bold border border-transparent truncate transition-colors";
        btn.textContent = sub;
        btn.onclick = (ev) => {
          ev.preventDefault(); selectedSubCategory = sub;
          Array.from(subBox.children).forEach(b => b.className = "py-2 px-1 bg-gray-50 text-ink/70 rounded-xl text-[11px] font-bold border border-transparent truncate transition-colors");
          btn.className = "py-2 px-1 bg-macaronRose text-ink rounded-xl text-[11px] font-bold border border-transparent truncate transition-colors shadow-sm";
        };
        subBox.appendChild(btn);
      });
    }

    document.getElementById("entryForm").onsubmit = async (e) => {
      e.preventDefault(); 
      const amt = Number(document.getElementById("amountInput").value);
      if (!amt || !selectedType) return;
      const entry = { id: Date.now().toString(), type: selectedType, amount: amt, date: document.getElementById("dateInput").value, note: document.getElementById("noteInput").value, mainCategory: selectedType === 'expense' ? selectedMainCategory : null, subCategory: selectedType === 'expense' ? selectedSubCategory : null };
      entries.unshift(entry); localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render(); switchTab('Home'); 
      document.getElementById("amountInput").value = ""; document.getElementById("noteInput").value = "";
      try { await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(entry) }); await loadDataFromSheet(); } catch(err) {}
    };

    window.deleteEntry = async (id) => {
      if(!confirm("確定要刪除這筆紀錄嗎？")) return;
      entries = entries.filter(e => e.id !== id); localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render();
      try { await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'DELETE', id: id }) }); } catch(err) {}
    };

    function updateBillSummary() {
        let total = 0;
        fixedBills.forEach(b => { if (b.amount) { const val = parseFloat(b.amount); if (!isNaN(val)) total += val; }});
        document.getElementById("billTotalDisplay").textContent = "$" + total.toLocaleString();
    }

    function renderFixedBills() {
      const billListEl = document.getElementById("billList");
      billListEl.innerHTML = "";
      if (fixedBills.length === 0) { 
          billListEl.innerHTML = `<p class="text-xs text-ink/30 text-center py-12 font-medium">目前沒有待繳項目 ✨</p>`; 
          updateBillSummary(); return; 
      }
      fixedBills.forEach((b, i) => {
        const div = document.createElement("div");
        div.className = "flex items-center gap-2 py-3 border-b border-gray-100 px-2";
        div.innerHTML = `
          <input type="checkbox" class="custom-checkbox flex-shrink-0" ${b.done ? "checked" : ""} onchange="checkBill(${i})" />
          <div class="flex-1 flex items-center bg-gray-50 rounded-xl px-3 py-2">
            <input type="text" class="bill-input-name font-medium ${b.done ? 'bill-done' : ''}" value="${b.name || ''}" onblur="updateBill(${i}, 'name', this.value)" placeholder="內容..." />
            <span class="text-gray-300 mx-1">|</span>
            <input type="number" inputmode="decimal" class="bill-input-amount ${b.done ? 'bill-done' : ''}" value="${b.amount || ''}" onblur="updateBill(${i}, 'amount', this.value)" placeholder="0" />
          </div>
          <button onclick="deleteBill(${i})" class="text-[10px] text-ink/30 font-bold px-1 flex-shrink-0 hover:text-rose">刪除</button>
        `;
        billListEl.appendChild(div);
      });
      updateBillSummary();
    }

    window.updateBill = (i, field, val) => { 
      fixedBills[i][field] = val; 
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); 
      if (field === 'amount') renderFixedBills();
    };

    document.getElementById("addBillBtn").onclick = () => {
      fixedBills.push({ name: "", amount: "", done: false });
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills();
      const inputs = document.getElementById("billList").querySelectorAll('.bill-input-name');
      if(inputs.length > 0) inputs[inputs.length - 1].focus();
    };

    window.checkBill = (i) => { fixedBills[i].done = !fixedBills[i].done; localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills(); };
    window.deleteBill = (i) => { if (confirm("確定刪除？")) { fixedBills.splice(i, 1); localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills(); } };

    function renderPieChart(list) {
      const ctx = document.getElementById("expensePieChart");
      const data = {}; list.filter(e => e.type==='expense').forEach(e => { if(e.mainCategory) data[e.mainCategory] = (data[e.mainCategory]||0) + e.amount; });
      if(pieChart) pieChart.destroy();
      pieChart = new Chart(ctx, { type:'pie', data: { labels:Object.keys(data), datasets:[{ data:Object.values(data), backgroundColor: chartColors }] }, options: { plugins: { legend: { position:'bottom', labels: { font:{size:11, family: "'Zen Maru Gothic', sans-serif"}, color: '#3D3D3D' } } } } });
    }

    function safeCalculate(expression) {
        if(!expression) return "";
        let str = expression.toString().replace(/×/g, '*').replace(/÷/g, '/');
        try { const result = new Function('return ' + str)(); return (!isFinite(result) || isNaN(result)) ? expression : String(result); } catch(e) { return expression; }
    }

    document.getElementById("calcKeypad").onclick = (e) => {
      const v = e.target.dataset.val; if(!v) return;
      let display = document.getElementById("calcDisplay");
      if(v === 'C') display.textContent = '0';
      else if (v === 'DEL') display.textContent = display.textContent.length > 1 ? display.textContent.slice(0, -1) : '0';
      else if(v === '=') display.textContent = safeCalculate(display.textContent);
      else display.textContent = (display.textContent === '0' && !['+', '-', '*', '/'].includes(v)) ? v : display.textContent + v;
    };

    document.getElementById("btnIncome").onclick = () => setupForm('income');
    document.getElementById("btnExpense").onclick = () => setupForm('expense');
    document.getElementById("btnSaving").onclick = () => setupForm('saving');
    document.getElementById("monthFilter").onchange = render;

    init();
  </script>
</body>
</html>
