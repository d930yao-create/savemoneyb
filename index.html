<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>bowbow記帳本</title>

  <meta name="apple-mobile-web-app-title" content="bowbow記帳本">
  <meta name="application-name" content="bowbow記帳本">

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            milk: "#FFFBFC",      // 櫻花白
            milk2: "#FFF0F3",     // 草莓牛奶
            berry: "#FFB7CE",     // 柔粉色
            blush: "#FFE5EC",     // 淡腮紅粉
            pastel: "#FFD1DC",    // 玫瑰粉
            ink: "#5E548E",       // 深李紫 (文字用)
            success: "#A2D2FF",   // 蘇打藍
          },
          boxShadow: {
            soft: "0 4px 15px 0 rgba(255, 183, 206, 0.15)",
            float: "0 8px 25px rgba(255, 183, 206, 0.3)",
          },
        },
      },
    };
  </script>

  <style>
    .page-content { display: none; height: 100%; }
    .page-content.active { display: flex; flex-direction: column; }
    .card-solid { background: #FFFFFF !important; border: 1px solid #FFE5EC; }
    button { -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-checkbox { accent-color: #FFB7CE; width: 18px; height: 18px; }
    .bill-done { text-decoration: line-through; color: #D1D1D1 !important; opacity: 0.6; }
    
    /* 待繳雙欄編輯 */
    .bill-input-name { background: transparent; border: none; width: 100%; font-size: 16px; color: #5E548E; outline: none; }
    .bill-input-amount { background: transparent; border: none; width: 80px; font-size: 15px; color: #FF6B95; outline: none; text-align: right; font-weight: 600; }
    
    .nav-active { background-color: #FFF0F3; opacity: 1 !important; filter: grayscale(0) !important; }
  </style>
</head>

<body class="bg-milk text-ink h-screen overflow-hidden relative">
  
  <div class="max-w-xl mx-auto px-4 py-6 h-full flex flex-col">
    
    <div id="pageHome" class="page-content active">
      <section class="card-solid rounded-[32px] p-5 flex-shrink-0 shadow-soft mb-4">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-lg font-bold text-ink/80">✨ 本月總覽</h1>
          <input id="monthFilter" type="month" class="px-3 py-1 bg-milk2/50 rounded-xl border border-blush text-xs text-ink outline-none appearance-none" />
        </div>
        <div class="flex justify-between items-center bg-milk2/40 rounded-2xl p-3 mb-4">
          <div class="text-center w-1/3"><p class="text-[10px] text-ink/40 mb-1">收入</p><p id="sumIncome" class="text-sm font-semibold text-success">$0</p></div>
          <div class="text-center w-1/3 border-l border-r border-white"><p class="text-[10px] text-ink/40 mb-1">支出</p><p id="sumExpense" class="text-sm font-semibold text-berry">$0</p></div>
          <div class="text-center w-1/3"><p class="text-[10px] text-ink/40 mb-1">儲蓄</p><p id="sumSaving" class="text-sm font-semibold text-ink/50">$0</p></div>
        </div>
        <div class="bg-milk/50 border border-blush/30 rounded-2xl p-4 flex justify-between items-center">
          <div class="flex flex-col"><span class="text-xs text-ink/60">可用現金</span><span class="text-[9px] text-ink/30">已扣除支出與儲蓄</span></div>
          <span id="sumBalance" class="text-xl font-bold text-berry">$0</span>
        </div>
      </section>

      <section class="card-solid rounded-[32px] p-4 flex-grow flex flex-col overflow-hidden shadow-soft mb-20">
        <div class="flex justify-between items-center mb-3 px-1">
          <h2 class="text-sm font-semibold text-ink/70 font-medium">📋 明細清單</h2>
          <span id="recordCount" class="text-xs text-ink/30"></span>
        </div>
        <div id="mobileList" class="space-y-2 overflow-y-auto hide-scrollbar pb-10"></div>
        <p id="emptyHint" class="text-xs text-ink/20 mt-10 hidden text-center">目前沒有紀錄。</p>
      </section>
    </div>

    <div id="pageChart" class="page-content">
      <h3 class="text-lg font-bold text-ink/80 mb-6 px-2">📊 支出分類統計</h3>
      <div class="card-solid rounded-[32px] p-6 shadow-soft">
        <div class="h-[300px] flex items-center justify-center">
          <canvas id="expensePieChart"></canvas>
        </div>
      </div>
    </div>

    <div id="pageAdd" class="page-content">
      <h3 class="text-lg font-bold text-berry mb-6 px-2">🍓 新增記錄</h3>
      <div class="card-solid rounded-[32px] p-6 shadow-soft space-y-6">
        <div class="grid grid-cols-3 gap-3">
          <button id="btnIncome" class="py-3 rounded-2xl bg-milk text-sm border border-blush text-ink">💗 收入</button>
          <button id="btnExpense" class="py-3 rounded-2xl bg-milk text-sm border border-blush text-ink">🧾 支出</button>
          <button id="btnSaving" class="py-3 rounded-2xl bg-milk text-sm border border-blush text-ink">🐷 儲蓄</button>
        </div>
        <form id="entryForm" class="space-y-5">
          <div class="flex flex-col gap-4">
            <input id="amountInput" type="text" inputmode="search" class="box-border w-full bg-milk/50 px-5 py-4 rounded-[20px] border border-blush text-[20px] font-bold text-berry outline-none focus:bg-white transition-all" placeholder="金額 (支援 100+200)" />
            <input id="dateInput" type="date" class="box-border w-full bg-milk/50 px-5 py-4 rounded-[20px] border border-blush text-[16px] outline-none focus:bg-white appearance-none" />
          </div>
          <div id="expenseCategoryBlock" class="hidden space-y-4">
            <div id="mainCategoryButtons" class="grid grid-cols-4 gap-2 text-xs"></div>
            <div id="subCategoryButtons" class="grid grid-cols-4 gap-2 text-xs hidden pt-4 border-t border-blush/30"></div>
          </div>
          <input id="noteInput" type="text" class="box-border w-full bg-milk/50 px-5 py-4 rounded-[20px] border border-blush text-[16px] outline-none focus:bg-white transition-all" placeholder="備註 (可留白)" />
          <button type="submit" class="w-full py-4 bg-berry text-white rounded-[20px] text-md shadow-float font-bold active:scale-95 transition-transform">＋ 加入紀錄</button>
        </form>
      </div>
    </div>

    <div id="pageNotes" class="page-content">
      <h3 class="text-lg font-bold text-berry mb-6 px-2">📒 待繳清單</h3>
      <div class="card-solid rounded-[32px] p-5 shadow-soft flex-grow flex flex-col overflow-hidden mb-20">
        <div class="flex px-10 mb-2 text-[10px] text-ink/30 uppercase tracking-widest font-bold">
            <span class="flex-1">項目名稱</span>
            <span class="w-[80px] text-right">預計金額</span>
        </div>
        <div id="billList" class="overflow-y-auto hide-scrollbar space-y-1 mb-4 px-1"></div>
        <button id="addBillBtn" class="w-full py-4 border-2 border-dashed border-blush text-berry/60 rounded-[20px] text-sm font-bold bg-milk active:bg-milk2 transition-colors mt-auto">＋ 新增一列項目</button>
      </div>
    </div>

    <div id="pageCalc" class="page-content">
      <h3 class="text-lg font-bold text-ink/80 mb-6 px-2">🌸 小計算機</h3>
      <div class="card-solid rounded-[32px] p-5 shadow-soft">
        <div class="bg-milk2/50 rounded-[24px] p-6 mb-6 text-right border border-blush">
          <div id="calcHistory" class="text-[10px] text-ink/30 min-h-[16px] mb-1"></div>
          <div id="calcDisplay" class="text-4xl font-bold text-berry truncate">0</div>
        </div>
        <div class="grid grid-cols-4 gap-3" id="calcKeypad">
          <button class="bg-white text-ink py-5 rounded-2xl text-xl shadow-sm border border-blush/20" data-val="C">C</button>
          <button class="bg-white text-ink py-5 rounded-2xl text-xl shadow-sm border border-blush/20" data-val="DEL">⌫</button>
          <button class="bg-white text-ink py-5 rounded-2xl text-xl shadow-sm border border-blush/20" data-val="%">%</button>
          <button class="bg-blush text-berry py-5 rounded-2xl text-xl font-bold" data-val="/">÷</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="7">7</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="8">8</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="9">9</button>
          <button class="bg-blush text-berry py-5 rounded-2xl text-xl font-bold" data-val="*">×</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="4">4</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="5">5</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="6">6</button>
          <button class="bg-blush text-berry py-5 rounded-2xl text-xl font-bold" data-val="-">-</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="1">1</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="2">2</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val="3">3</button>
          <button class="bg-blush text-berry py-5 rounded-2xl text-xl font-bold" data-val="+">+</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm col-span-2" data-val="0">0</button>
          <button class="bg-white text-ink border border-blush/10 py-5 rounded-2xl text-xl shadow-sm" data-val=".">.</button>
          <button class="bg-berry text-white py-5 rounded-2xl text-xl shadow-float font-bold" data-val="=">=</button>
        </div>
      </div>
    </div>

  </div>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-xl bg-white border-t border-blush/30 rounded-t-[40px] pb-8 pt-3 px-8 flex justify-between z-40 shadow-[0_-5px_25px_rgba(255,183,206,0.1)]">
    <button onclick="switchTab('Home')" id="navHome" class="flex flex-col items-center p-3 rounded-2xl transition-all grayscale opacity-40 nav-active"><span class="text-2xl">🏠</span></button>
    <button onclick="switchTab('Chart')" id="navChart" class="flex flex-col items-center p-3 rounded-2xl transition-all grayscale opacity-40"><span class="text-2xl">🍪</span></button>
    <button onclick="switchTab('Add')" id="navAdd" class="flex flex-col items-center p-3 rounded-2xl transition-all grayscale opacity-40"><span class="text-2xl">✏️</span></button>
    <button onclick="switchTab('Notes')" id="navNotes" class="flex flex-col items-center p-3 rounded-2xl transition-all grayscale opacity-40"><span class="text-2xl">📒</span></button>
    <button onclick="switchTab('Calc')" id="navCalc" class="flex flex-col items-center p-3 rounded-2xl transition-all grayscale opacity-40"><span class="text-2xl">🐥</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const categoryData = {
      "🍱 飲食": ["早餐", "午餐", "晚餐", "點心", "宵夜", "小吃", "飲料", "其他"],
      "🚗 交通": ["大眾運輸", "加油", "Uber／計程車", "停車費", "其他"],
      "🛒 生活": ["個人用品", "家庭用品", "生活用品", "文具小物", "五金工具", "其他"],
      "🛍️ 購物": ["衣服", "鞋子", "配件", "美妝", "其他"],
      "💳 帳單": ["卡費", "手機費", "健保費", "房租", "電費", "水費", "網路", "其他"],
      "🐱 貓咪": ["罐頭", "乾乾", "零食", "貓砂", "玩具", "醫療", "用品", "其他"],
      "💖 美容": ["美甲", "美睫", "保養", "美髮", "保養品", "其他"],
      "🎮 娛樂": ["電影", "KTV", "遊戲", "聚會", "網咖", "其他"],
      "🏥 醫療": ["看診", "藥品", "健康檢查", "其他醫療"],
      "✈️ 旅遊": ["住宿", "交通", "門票", "伴手禮", "其他"],
      "🎀 其他": ["臨時開銷", "小額花費", "收支平衡", "其他"]
    };

    const STORAGE_KEY = "cute-book-entries-v2", FIXED_BILLS_KEY = "cute-fixed-bills-v3";
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyePbfCt3HsLD-cKRqZfREIsB07FGiecvFiPiXpGMVHWAdC0_JgmOW0OzvRXlzXqFV4/exec';
    
    // 圖表顏色也換成粉嫩系
    const chartColors = ['#FFB7CE', '#FFD1DC', '#A2D2FF', '#BDE0FE', '#FFC8DD', '#FFAFCC', '#CDB4DB', '#E9C46A', '#F4A261', '#E76F51'];

    let entries = [], fixedBills = [], selectedType = null, selectedMainCategory = null, selectedSubCategory = null, pieChart = null;

    function switchTab(tabName) {
      document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + tabName).classList.add('active');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'grayscale-0', 'opacity-100'));
      document.getElementById('nav' + tabName).classList.add('nav-active', 'grayscale-0', 'opacity-100');
      if(tabName === 'Chart') renderPieChart(entries.filter(e => e.date && e.date.startsWith(document.getElementById("monthFilter").value)));
    }

    async function init() {
      const t = new Date(); const currentMonth = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`;
      document.getElementById("monthFilter").value = currentMonth;
      document.getElementById("dateInput").value = `${currentMonth}-${String(t.getDate()).padStart(2,"0")}`;
      entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      fixedBills = JSON.parse(localStorage.getItem(FIXED_BILLS_KEY) || "[]");
      render(); renderFixedBills(); loadDataFromSheet();
    }

    async function loadDataFromSheet() {
      try {
        const res = await fetch(SCRIPT_URL); const result = await res.json();
        if (result.status === 'success') {
          entries = result.data.map(e => ({...e, amount: parseFloat(e.amount), date: (e.date||'').split('T')[0]}));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render();
        }
      } catch(e){}
    }

    function render() {
      const currentMonth = document.getElementById("monthFilter").value;
      const list = entries.filter(e => e.date && e.date.startsWith(currentMonth)).sort((a,b) => b.date.localeCompare(a.date));
      let inc=0, exp=0, sav=0;
      list.forEach(e => { if(e.type==='income') inc+=e.amount; if(e.type==='expense') exp+=e.amount; if(e.type==='saving') sav+=e.amount; });
      document.getElementById("sumIncome").textContent = "$"+inc.toLocaleString();
      document.getElementById("sumExpense").textContent = "$"+exp.toLocaleString();
      document.getElementById("sumSaving").textContent = "$"+sav.toLocaleString();
      document.getElementById("sumBalance").textContent = "$"+(inc - exp - sav).toLocaleString();
      document.getElementById("recordCount").textContent = `共 ${list.length} 筆`;
      
      const listEl = document.getElementById("mobileList");
      listEl.innerHTML = "";
      document.getElementById("emptyHint").classList.toggle("hidden", list.length > 0);
      list.forEach(e => {
        const card = document.createElement("div"); 
        card.className = "bg-white border border-blush/30 rounded-2xl p-3 text-sm shadow-sm";
        const badge = e.type==='income' ? 'bg-success/10 text-success' : (e.type==='saving' ? 'bg-ink/5 text-ink/40' : 'bg-berry/10 text-berry');
        card.innerHTML = `<div class="flex justify-between items-start"><div><span class="px-2 py-0.5 rounded-md text-[10px] ${badge} border border-blush/20">${e.type==='income'?'收入':(e.type==='saving'?'儲蓄':'支出')}</span> <span class="font-medium text-ink ml-1">${e.mainCategory||''} ${e.subCategory||''}</span><p class="text-[10px] text-ink/30 mt-1">${e.date} ${e.note ? '· '+e.note : ''}</p></div><div class="text-right"><p class="font-bold text-ink">$${e.amount.toLocaleString()}</p><button onclick="deleteEntry('${e.id}')" class="text-[10px] text-ink/20 mt-1">刪除</button></div></div>`;
        listEl.appendChild(card);
      });
    }

    function setupForm(type) {
      selectedType = type;
      document.getElementById("expenseCategoryBlock").classList.toggle("hidden", type !== 'expense');
      ['btnIncome', 'btnExpense', 'btnSaving'].forEach(id => {
        const btn = document.getElementById(id);
        btn.classList.remove('bg-berry', 'text-white'); btn.classList.add('bg-milk', 'text-ink');
      });
      const activeBtn = document.getElementById(type === 'income' ? 'btnIncome' : (type === 'expense' ? 'btnExpense' : 'btnSaving'));
      activeBtn.classList.replace('bg-milk', 'bg-berry'); activeBtn.classList.add('text-white');
      if(type === 'expense') renderCategories();
    }

    function renderCategories() {
      const box = document.getElementById("mainCategoryButtons"); box.innerHTML = "";
      Object.keys(categoryData).forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "py-2 px-1 bg-milk text-ink rounded-xl text-[11px] truncate border border-blush/40";
        btn.textContent = cat;
        btn.onclick = (ev) => {
          ev.preventDefault(); selectedMainCategory = cat; selectedSubCategory = categoryData[cat][0];
          Array.from(box.children).forEach(b => { b.classList.remove('bg-berry', 'text-white'); b.classList.add('bg-milk', 'text-ink'); });
          btn.classList.replace('bg-milk', 'bg-berry'); btn.classList.add('text-white');
          renderSubCategories(cat);
        };
        box.appendChild(btn);
      });
    }

    function renderSubCategories(mainCat) {
      const subBox = document.getElementById("subCategoryButtons"); subBox.innerHTML = ""; subBox.classList.remove("hidden");
      categoryData[mainCat].forEach(sub => {
        const btn = document.createElement("button");
        btn.className = "py-2 px-1 bg-milk text-ink rounded-xl text-[11px] truncate border border-blush/40";
        btn.textContent = sub;
        btn.onclick = (ev) => {
          ev.preventDefault(); selectedSubCategory = sub;
          Array.from(subBox.children).forEach(b => { b.classList.remove('bg-berry', 'text-white'); b.classList.add('bg-milk', 'text-ink'); });
          btn.classList.replace('bg-milk', 'bg-berry'); btn.classList.add('text-white');
        };
        subBox.appendChild(btn);
      });
    }

    // 支援運算的魔法
    function safeCalculate(expression) {
        if(!expression) return "";
        let str = expression.toString().replace(/×/g, '*').replace(/÷/g, '/');
        if (/[^0-9+\-*/.]/.test(str)) return str;
        try { const result = new Function('return ' + str)(); return (!isFinite(result) || isNaN(result)) ? str : String(result); } catch(e) { return str; }
    }

    document.getElementById("amountInput").onblur = function() { this.value = safeCalculate(this.value); };

    document.getElementById("entryForm").onsubmit = async (e) => {
      e.preventDefault(); 
      const amt = Number(safeCalculate(document.getElementById("amountInput").value));
      if (!amt || !selectedType) return;
      const entry = { id: Date.now().toString(), type: selectedType, amount: amt, date: document.getElementById("dateInput").value, note: document.getElementById("noteInput").value, mainCategory: selectedType === 'expense' ? selectedMainCategory : null, subCategory: selectedType === 'expense' ? selectedSubCategory : null };
      entries.push(entry); localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      render(); switchTab('Home'); 
      document.getElementById("amountInput").value = ""; document.getElementById("noteInput").value = "";
      try { await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(entry) }); } catch(err) {}
    };

    window.deleteEntry = async (id) => {
      if(!confirm("確定要刪除這筆紀錄嗎？")) return;
      entries = entries.filter(e => e.id !== id); localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render();
      try { await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'DELETE', id: id }) }); } catch(err) {}
    };

    // --- 待繳筆記 (支援雙欄運算) ---
    function renderFixedBills() {
      const billListEl = document.getElementById("billList");
      billListEl.innerHTML = "";
      if (fixedBills.length === 0) { billListEl.innerHTML = `<p class="text-xs text-ink/20 text-center py-8">點下方新增待繳項目 ✨</p>`; return; }
      fixedBills.forEach((b, i) => {
        const div = document.createElement("div");
        div.className = "flex items-center gap-2 py-3 border-b border-blush/30 px-2";
        div.innerHTML = `
          <input type="checkbox" class="custom-checkbox flex-shrink-0" ${b.done ? "checked" : ""} onchange="checkBill(${i})" />
          <div class="flex-1 flex items-center bg-white rounded-xl px-3 py-1 border border-blush/10">
            <input type="text" class="bill-input-name ${b.done ? 'bill-done' : ''}" value="${b.name || ''}" onblur="updateBill(${i}, 'name', this.value)" placeholder="內容..." />
            <span class="text-blush mx-1 opacity-50">|</span>
            <input type="text" inputmode="search" class="bill-input-amount ${b.done ? 'bill-done' : ''}" value="${b.amount || ''}" onblur="updateBill(${i}, 'amount', this.value)" placeholder="0" />
          </div>
          <button onclick="deleteBill(${i})" class="text-[10px] text-ink/20 px-1 flex-shrink-0">刪除</button>
        `;
        billListEl.appendChild(div);
      });
    }

    window.updateBill = (i, field, val) => { 
      let finalVal = val;
      if (field === 'amount') {
          finalVal = safeCalculate(val);
          renderFixedBills(); // 即時更新運算結果
      }
      fixedBills[i][field] = finalVal; 
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); 
    };

    document.getElementById("addBillBtn").onclick = () => {
      fixedBills.push({ name: "", amount: "", done: false });
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills();
      const inputs = document.getElementById("billList").querySelectorAll('.bill-input-name');
      if(inputs.length > 0) inputs[inputs.length - 1].focus();
    };

    window.checkBill = (i) => { fixedBills[i].done = !fixedBills[i].done; localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills(); };
    window.deleteBill = (i) => { if (confirm("確定刪除？")) { fixedBills.splice(i, 1); localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills(); } };

    function renderPieChart(list) {
      const ctx = document.getElementById("expensePieChart");
      const data = {}; list.filter(e => e.type==='expense').forEach(e => { if(e.mainCategory) data[e.mainCategory] = (data[e.mainCategory]||0) + e.amount; });
      if(pieChart) pieChart.destroy();
      pieChart = new Chart(ctx, { type:'pie', data: { labels:Object.keys(data), datasets:[{ data:Object.values(data), backgroundColor: chartColors }] }, options: { plugins: { legend: { position:'bottom', labels: { font:{size:10}, color: '#5E548E' } } } } });
    }

    document.getElementById("calcKeypad").onclick = (e) => {
      const v = e.target.dataset.val; if(!v) return;
      let display = document.getElementById("calcDisplay");
      if(v === 'C') display.textContent = '0';
      else if (v === 'DEL') display.textContent = display.textContent.length > 1 ? display.textContent.slice(0, -1) : '0';
      else if(v === '=') display.textContent = safeCalculate(display.textContent);
      else display.textContent = (display.textContent === '0' && !['+', '-', '*', '/'].includes(v)) ? v : display.textContent + v;
    };

    document.getElementById("btnIncome").onclick = () => setupForm('income');
    document.getElementById("btnExpense").onclick = () => setupForm('expense');
    document.getElementById("btnSaving").onclick = () => setupForm('saving');
    document.getElementById("monthFilter").onchange = render;

    init();
  </script>
</body>
</html>
