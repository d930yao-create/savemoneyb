<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>bowbow記帳本</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Zen Maru Gothic"', 'sans-serif'], 
          },
          colors: {
            milk: "#FFFDFB",          // 回歸極淡的粉橘白底色
            cardBg: "#FFFFFF",        
            lavenderSoft: "#FFF0F5",  // 把灰底換成極淡的粉膚色，更溫暖
            lavenderBorder: "#FFE0E9",// 溫柔的粉色邊框
            macaronTeal: "#CDEAE7",   // 妳設定的薄荷綠
            macaronRose: "#FFE3EE",   // 修正：用乾淨的淡粉取代灰階粉
            macaronOrange: "#FFD180", 
            macaronPeach: "#F9E5DC",  // 妳設定的蜜桃橘
            navYellow: "#FFF9C4",   
            rose: "#FF4D8D",          // 妳設定的主角色
            ink: "#5C3A2E",           // 妳設定的深棕色字體，超搭！
            happyOrange: "#FF9800"  
          },
          boxShadow: { 
            soft: "0 4px 15px 0 rgba(255, 77, 141, 0.05)", // 換回淡淡的粉色陰影
            float: "0 8px 25px rgba(255, 77, 141, 0.2)"    // 減輕強烈感
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Zen Maru Gothic', sans-serif; }
    .page-content { display: none; height: 100%; }
    .page-content.active { display: flex; flex-direction: column; }
    
    .card-solid { background: #FFFFFF !important; border: 1px solid #FFE0E9; }

    .slide-up-drawer { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    button { -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .custom-checkbox { accent-color: #FF4D8D; width: 22px; height: 22px; }
    .bill-done { text-decoration: line-through; color: #D7CCC8 !important; opacity: 0.6; }
    
    .bill-input-name { background: transparent; border: none; width: 100%; font-size: 18px; color: #5C3A2E; outline: none; }
    .bill-input-amount { background: transparent; border: none; width: 90px; font-size: 18px; color: #FF4D8D; outline: none; text-align: right; font-weight: 700; }
    
    .nav-active { background-color: #FFF9C4; opacity: 1 !important; transform: translateY(-2px); }
    
    #floatingCalc { 
        position: fixed; 
        bottom: 160px; 
        right: 20px; 
        z-index: 50; 
        width: 60px; 
        height: 60px; 
        border-radius: 30px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 32px; 
        cursor: pointer; 
        background-color: #FFF9C4; 
        border: 1px solid #FFE0E9; 
        box-shadow: 0 6px 20px rgba(255, 77, 141, 0.15); 
        transition: transform 0.2s; 
    }
    #floatingCalc:active { transform: scale(0.9); }
  </style>
</head>

<body class="bg-milk text-ink h-screen overflow-hidden relative">
  
  <div id="floatingCalc" onclick="openCalc()">🐥</div>

  <div class="max-w-xl mx-auto px-4 py-6 h-full flex flex-col">
    <div id="pageHome" class="page-content active">
      <section class="card-solid rounded-[32px] p-5 flex-shrink-0 shadow-soft mb-4">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-xl font-bold text-ink">✨ 本月總覽</h1>
          <input id="monthFilter" type="month" class="px-3 py-1 bg-lavenderSoft rounded-xl border border-lavenderBorder text-sm text-ink outline-none appearance-none font-bold" />
        </div>
        
        <div class="flex justify-between items-center gap-3 mb-4">
          <div class="text-center w-1/3 bg-macaronTeal rounded-2xl p-4">
            <p class="text-sm text-ink/80 mb-1 font-bold">收入</p>
            <p id="sumIncome" class="text-lg font-bold text-ink">$0</p>
          </div>
          <div class="text-center w-1/3 bg-macaronRose rounded-2xl p-4">
            <p class="text-sm text-ink/80 mb-1 font-bold">支出</p>
            <p id="sumExpense" class="text-lg font-bold text-ink">$0</p>
          </div>
          <div class="text-center w-1/3 bg-[#FFC36B] rounded-2xl p-4">
            <p class="text-sm text-ink/80 mb-1 font-bold">儲蓄</p>
            <p id="sumSaving" class="text-lg font-bold text-ink">$0</p>
          </div>
        </div>
        
        <div class="bg-macaronPeach rounded-2xl p-5 flex justify-between items-center">
          <div class="flex flex-col"><span class="text-base text-ink font-bold">可用現金</span><span class="text-sm text-ink/60 font-medium mt-1">已扣除支出與儲蓄</span></div>
          <span id="sumBalance" class="text-2xl font-bold text-rose">$0</span>
        </div>
      </section>
      
      <section class="card-solid rounded-[32px] p-5 flex-grow flex flex-col overflow-hidden shadow-soft mb-4">
        <div class="flex justify-between items-center mb-4 px-1">
          <h2 class="text-xl font-bold text-ink">📋 明細清單</h2>
          <span id="recordCount" class="text-sm text-ink/60 font-bold"></span>
        </div>
        <div id="mobileList" class="space-y-3 overflow-y-auto hide-scrollbar pb-32"></div>
        <p id="emptyHint" class="text-sm text-ink/40 mt-10 hidden text-center font-bold">目前沒有紀錄。</p>
      </section>
    </div>

    <div id="pageNotes" class="page-content">
      <div class="flex justify-between items-center mb-6 px-2">
          <h3 class="text-xl font-bold text-ink">📒 待繳清單</h3>
          <div class="bg-macaronPeach px-4 py-2 rounded-2xl flex flex-col items-end">
              <span id="billTotalDisplay" class="text-lg font-bold text-rose">$0</span>
          </div>
      </div>
      <div class="card-solid rounded-[32px] p-5 shadow-soft flex-grow flex flex-col overflow-hidden mb-4 pb-32">
        <div class="flex px-10 mb-3 text-sm text-ink/50 font-bold flex-shrink-0">
            <span class="flex-1">項目名稱</span>
            <span class="w-[90px] text-right">預計金額</span>
        </div>
        <div id="billList" class="overflow-y-auto hide-scrollbar space-y-2 mb-4 px-1 flex-grow"></div>
        <button id="addBillBtn" class="w-full py-4 border-2 border-dashed border-macaronPeach text-ink/70 rounded-[20px] text-base font-bold bg-milk active:bg-lavenderSoft transition-colors flex-shrink-0">➕ 新增項目</button>
      </div>
    </div>
    
    <div id="pageChart" class="page-content">
      <h3 class="text-xl font-bold text-ink mb-6 px-2">📊 分類統計</h3>
      <div class="card-solid rounded-[32px] p-6 shadow-soft">
        <div class="h-[300px] flex items-center justify-center">
          <canvas id="expensePieChart"></canvas>
        </div>
      </div>
    </div>

    <div id="pageAdd" class="page-content">
      <h3 class="text-xl font-bold text-ink mb-6 px-2">🍓 新增記錄</h3>
      <div class="card-solid rounded-[32px] p-6 shadow-soft space-y-6">
        <div class="grid grid-cols-3 gap-3">
          <button id="btnIncome" class="py-4 rounded-2xl bg-macaronTeal/30 text-base font-bold text-ink transition-colors">💗 收入</button>
          <button id="btnExpense" class="py-4 rounded-2xl bg-macaronRose text-base font-bold text-ink transition-colors shadow-sm">🧾 支出</button>
          <button id="btnSaving" class="py-4 rounded-2xl bg-[#FFC36B]/30 text-base font-bold text-ink transition-colors">🐷 儲蓄</button>
        </div>
        <form id="entryForm" class="space-y-6">
          <div class="flex flex-col gap-4">
            <input id="amountInput" type="number" inputmode="decimal" class="box-border w-full bg-lavenderSoft px-5 py-4 rounded-[20px] border-none text-[22px] font-bold text-rose outline-none focus:bg-lavenderBorder transition-all" placeholder="輸入金額" />
            <input id="dateInput" type="date" class="box-border w-full bg-lavenderSoft px-5 py-4 rounded-[20px] border-none text-[18px] text-ink font-bold outline-none focus:bg-lavenderBorder appearance-none" />
          </div>
          <div id="expenseCategoryBlock" class="hidden space-y-4">
            <div id="mainCategoryButtons" class="grid grid-cols-4 gap-2"></div>
            <div id="subCategoryButtons" class="grid grid-cols-4 gap-2 hidden pt-4 border-t border-lavenderBorder"></div>
          </div>
          <input id="noteInput" type="text" class="box-border w-full bg-lavenderSoft px-5 py-4 rounded-[20px] border-none text-[18px] font-bold text-ink outline-none focus:bg-lavenderBorder transition-all" placeholder="備註 (可留白)" />
          
          <button type="submit" class="w-full py-5 bg-rose/90 text-white rounded-[20px] text-lg shadow-float font-bold hover:bg-rose active:scale-95 transition-all">＋ 加入紀錄</button>
        </form>
      </div>
    </div>
  </div>

  <div id="calcModal" class="fixed inset-0 bg-ink/30 z-[60] hidden flex-col justify-end backdrop-blur-sm" onclick="if(event.target==this) closeCalc()">
    <div class="bg-milk w-full max-w-xl mx-auto rounded-t-[40px] p-6 pb-12 shadow-2xl slide-up-drawer" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-ink flex items-center gap-2">🌸 計算機</h3><button onclick="closeCalc()" class="text-lavenderBorder hover:text-ink text-4xl">&times;</button></div>
      <div class="bg-cardBg rounded-[24px] p-6 mb-6 text-right border border-lavenderBorder shadow-sm">
        <div id="calcHistory" class="text-sm text-ink/50 min-h-[20px] mb-1 font-bold"></div>
        <div id="calcDisplay" class="text-4xl font-bold text-rose truncate">0</div>
      </div>
      <div class="grid grid-cols-4 gap-3" id="calcKeypad">
        <button class="bg-lavenderSoft text-ink py-5 rounded-2xl text-2xl font-bold" data-val="C">C</button>
        <button class="bg-lavenderSoft text-ink py-5 rounded-2xl text-2xl font-bold" data-val="DEL">⌫</button>
        <button class="bg-lavenderSoft text-ink py-5 rounded-2xl text-2xl font-bold" data-val="%">%</button>
        <button class="bg-macaronPeach text-ink py-5 rounded-2xl text-2xl font-bold" data-val="/">÷</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="7">7</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="8">8</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="9">9</button>
        <button class="bg-macaronPeach text-ink py-5 rounded-2xl text-2xl font-bold" data-val="*">×</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="4">4</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="5">5</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="6">6</button>
        <button class="bg-macaronPeach text-ink py-5 rounded-2xl text-2xl font-bold" data-val="-">-</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="1">1</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="2">2</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val="3">3</button>
        <button class="bg-macaronPeach text-ink py-5 rounded-2xl text-2xl font-bold" data-val="+">+</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm col-span-2 font-bold" data-val="0">0</button>
        <button class="bg-cardBg text-ink border border-lavenderBorder py-5 rounded-2xl text-2xl shadow-sm font-bold" data-val=".">.</button>
        <button class="bg-rose/90 text-white py-5 rounded-2xl text-2xl shadow-float font-bold" data-val="=">=</button>
      </div>
    </div>
  </div>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-xl bg-cardBg border-t border-lavenderBorder rounded-t-[40px] pb-8 pt-4 px-10 flex justify-between z-40 shadow-soft">
    <button onclick="switchTab('Home')" id="navHome" class="flex flex-col items-center p-3 rounded-2xl transition-all nav-active"><span class="text-3xl drop-shadow-sm">🏠</span></button>
    <button onclick="switchTab('Chart')" id="navChart" class="flex flex-col items-center p-3 rounded-2xl transition-all"><span class="text-3xl drop-shadow-sm">🍪</span></button>
    <button onclick="switchTab('Add')" id="navAdd" class="flex flex-col items-center p-3 rounded-2xl transition-all"><span class="text-3xl drop-shadow-sm">✏️</span></button>
    <button onclick="switchTab('Notes')" id="navNotes" class="flex flex-col items-center p-3 rounded-2xl transition-all"><span class="text-3xl drop-shadow-sm">📒</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const categoryData = {
      expense: {
        "🍱 飲食":["早餐","午餐","晚餐","點心","宵夜","小吃","飲料","其他"],
        "🚗 交通":["大眾運輸","加油","Uber／計程車","停車費","其他"],
        "🛒 生活":["個人用品","家庭用品","生活用品","文具小物","五金工具","其他"],
        "🛍️ 購物":["衣服","鞋子","配件","美妝","其他"],
        "💳 帳單":["卡費","手機費","健保費","房租","電費","水費","網路","其他"],
        "🐱 貓咪":["罐頭","乾乾","零食","貓砂","玩具","醫療","用品","其他"],
        "💖 美容":["美甲","美睫","保養","美髮","保養品","其他"],
        "🎮 娛樂":["電影","KTV","遊戲","聚會","網咖","其他"],
        "🏥 醫療":["看診","藥品","健康檢查","其他醫療"],
        "✈️ 旅遊":["住宿","交通","門票","伴手禮","其他"],
        "🎀 其他":["臨時開銷","小額花費","收支平衡","其他"]
      },
      income: {
        "💰 薪水":[], "🎁 獎金":[], "📈 投資":[], "👾 遊戲":[], "🧧 其他":[]
      },
      saving: {
        "🐷 存錢筒":[], "🎯 夢想基金":[], "📈 股票":[], "💖 其他":[]
      }
    };

    const STORAGE_KEY = "cute-book-entries-v2", FIXED_BILLS_KEY = "cute-fixed-bills-v3";
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyePbfCt3HsLD-cKRqZfREIsB07FGiecvFiPiXpGMVHWAdC0_JgmOW0OzvRXlzXqFV4/exec';
    
    // 圓餅圖顏色配合溫暖粉橘調
    const chartColors = ['#FFE3EE', '#CDEAE7', '#FFC36B', '#F9E5DC', '#FF4D8D', '#FFF0F5', '#E9E0EF'];

    let entries = [], fixedBills = [], selectedType = null, selectedMainCategory = null, selectedSubCategory = null, pieChart = null;

    function openCalc() { document.getElementById('calcModal').classList.replace('hidden','flex'); }
    function closeCalc() { document.getElementById('calcModal').classList.replace('flex','hidden'); }

    function switchTab(tabName) {
      document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + tabName).classList.add('active');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
      document.getElementById('nav' + tabName).classList.add('nav-active');
      if(tabName === 'Chart') renderPieChart(entries.filter(e => e.date && e.date.startsWith(document.getElementById("monthFilter").value)));
    }

    async function init() {
      const t = new Date(); document.getElementById("monthFilter").value = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`;
      document.getElementById("dateInput").value = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
      entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      fixedBills = JSON.parse(localStorage.getItem(FIXED_BILLS_KEY) || "[]");
      render(); renderFixedBills();
      await loadDataFromSheet();
      setInterval(loadDataFromSheet, 60000); 
    }

    async function loadDataFromSheet() {
      try {
        const res = await fetch(SCRIPT_URL);
        const result = await res.json();
        if (result.status === 'success') {
          const cloudData = result.data.map(e => ({...e, amount: parseFloat(e.amount), date: (e.date||'').split('T')[0]}));
          const localOnly = entries.filter(local => !cloudData.find(cloud => cloud.id === local.id));
          entries = [...cloudData, ...localOnly].sort((a,b) => b.date.localeCompare(a.date));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); 
          render();
        }
      } catch(e){}
    }

    function render() {
      const currentMonth = document.getElementById("monthFilter").value;
      const list = entries.filter(e => e.date && e.date.startsWith(currentMonth)).sort((a,b) => b.date.localeCompare(a.date));
      let inc=0, exp=0, sav=0;
      list.forEach(e => { if(e.type==='income') inc+=e.amount; if(e.type==='expense') exp+=e.amount; if(e.type==='saving') sav+=e.amount; });
      document.getElementById("sumIncome").textContent = "$"+inc.toLocaleString();
      document.getElementById("sumExpense").textContent = "$"+exp.toLocaleString();
      document.getElementById("sumSaving").textContent = "$"+sav.toLocaleString();
      document.getElementById("sumBalance").textContent = "$"+(inc - exp - sav).toLocaleString();
      document.getElementById("recordCount").textContent = `共 ${list.length} 筆`;
      
      const listEl = document.getElementById("mobileList");
      listEl.innerHTML = "";
      document.getElementById("emptyHint").classList.toggle("hidden", list.length > 0);
      list.forEach(e => {
        const card = document.createElement("div"); 
        card.className = "bg-white border border-lavenderBorder rounded-2xl p-4 shadow-sm mb-3";
        
        let badgeStr = "";
        let amountColor = "text-ink font-bold text-xl"; 
        
        if (e.type === 'income') {
            badgeStr = '<span class="px-3 py-1.5 rounded-lg text-sm bg-macaronTeal text-ink font-bold">收入</span>';
            amountColor = "text-happyOrange font-bold text-xl"; 
        } else if (e.type === 'saving') {
            badgeStr = '<span class="px-3 py-1.5 rounded-lg text-sm bg-[#FFC36B] text-ink font-bold">儲蓄</span>';
            amountColor = "text-ink font-bold text-xl"; 
        } else {
            badgeStr = '<span class="px-3 py-1.5 rounded-lg text-sm bg-macaronRose text-ink font-bold">支出</span>';
            amountColor = "text-rose font-bold text-xl"; 
        }
        
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              ${badgeStr} 
              <span class="font-bold text-ink ml-2 text-lg">${e.mainCategory||''} ${e.subCategory||''}</span>
              <p class="text-sm text-ink/60 mt-2 font-bold">${e.date} ${e.note ? '· '+e.note : ''}</p>
            </div>
            <div class="text-right">
              <p class="${amountColor}">$${e.amount.toLocaleString()}</p>
              <button onclick="deleteEntry('${e.id}')" class="text-sm text-ink/40 mt-1 hover:text-rose font-bold">刪除</button>
            </div>
          </div>
        `;
        listEl.appendChild(card);
      });
    }

    function setupForm(type) {
      selectedType = type;
      document.getElementById("expenseCategoryBlock").classList.toggle("hidden", false); 
      
      ['btnIncome', 'btnExpense', 'btnSaving'].forEach(id => {
        const btn = document.getElementById(id);
        btn.className = "py-4 rounded-2xl bg-lavenderSoft text-base font-bold text-ink/60 transition-colors";
      });
      const activeBtn = document.getElementById(type==='income'?'btnIncome':(type==='expense'?'btnExpense':'btnSaving'));
      
      if(type === 'income') activeBtn.className = "py-4 rounded-2xl bg-macaronTeal text-base font-bold text-ink transition-colors shadow-sm";
      if(type === 'expense') activeBtn.className = "py-4 rounded-2xl bg-macaronRose text-base font-bold text-ink transition-colors shadow-sm";
      if(type === 'saving') activeBtn.className = "py-4 rounded-2xl bg-[#FFC36B] text-base font-bold text-ink transition-colors shadow-sm";
      
      renderCategories();
    }

    function renderCategories() {
      const box = document.getElementById("mainCategoryButtons"); box.innerHTML = "";
      const currentData = categoryData[selectedType];
      
      Object.keys(currentData).forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "py-3 px-1 bg-lavenderSoft text-ink/70 rounded-xl text-base font-bold border border-transparent truncate transition-colors";
        btn.textContent = cat;
        btn.onclick = (ev) => {
          ev.preventDefault(); selectedMainCategory = cat;
          
          if(currentData[cat].length > 0) {
              selectedSubCategory = currentData[cat][0];
              renderSubCategories(cat);
          } else {
              selectedSubCategory = null;
              document.getElementById("subCategoryButtons").classList.add("hidden");
          }
          
          Array.from(box.children).forEach(b => b.className = "py-3 px-1 bg-lavenderSoft text-ink/70 rounded-xl text-base font-bold border border-transparent truncate transition-colors");
          
          const activeColor = selectedType === 'income' ? 'bg-macaronTeal' : (selectedType === 'saving' ? 'bg-[#FFC36B]' : 'bg-macaronRose');
          btn.className = `py-3 px-1 ${activeColor} text-ink rounded-xl text-base font-bold border border-transparent truncate transition-colors shadow-sm`;
        };
        box.appendChild(btn);
      });
    }

    function renderSubCategories(mainCat) {
      const subBox = document.getElementById("subCategoryButtons"); subBox.innerHTML = ""; 
      const currentData = categoryData[selectedType][mainCat];
      if(!currentData || currentData.length === 0) { subBox.classList.add("hidden"); return; }
      subBox.classList.remove("hidden");
      
      currentData.forEach(sub => {
        const btn = document.createElement("button");
        btn.className = "py-3 px-1 bg-lavenderSoft text-ink/70 rounded-xl text-base font-bold border border-transparent truncate transition-colors";
        btn.textContent = sub;
        btn.onclick = (ev) => {
          ev.preventDefault(); selectedSubCategory = sub;
          Array.from(subBox.children).forEach(b => b.className = "py-3 px-1 bg-lavenderSoft text-ink/70 rounded-xl text-base font-bold border border-transparent truncate transition-colors");
          
          const activeColor = selectedType === 'income' ? 'bg-macaronTeal' : (selectedType === 'saving' ? 'bg-[#FFC36B]' : 'bg-macaronRose');
          btn.className = `py-3 px-1 ${activeColor} text-ink rounded-xl text-base font-bold border border-transparent truncate transition-colors shadow-sm`;
        };
        subBox.appendChild(btn);
      });
    }

    document.getElementById("entryForm").onsubmit = async (e) => {
      e.preventDefault(); 
      const amt = Number(document.getElementById("amountInput").value);
      if (!amt || !selectedType || !selectedMainCategory) {
          alert('請確保金額與分類都有填寫喔！');
          return;
      }
      const entry = { id: Date.now().toString(), type: selectedType, amount: amt, date: document.getElementById("dateInput").value, note: document.getElementById("noteInput").value, mainCategory: selectedMainCategory, subCategory: selectedSubCategory };
      entries.unshift(entry); localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render(); switchTab('Home'); 
      document.getElementById("amountInput").value = ""; document.getElementById("noteInput").value = "";
      try { await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(entry) }); await loadDataFromSheet(); } catch(err) {}
    };

    window.deleteEntry = async (id) => {
      if(!confirm("確定要刪除這筆紀錄嗎？")) return;
      entries = entries.filter(e => e.id !== id); localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render();
      try { await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'DELETE', id: id }) }); } catch(err) {}
    };

    function updateBillSummary() {
        let total = 0;
        fixedBills.forEach(b => { if (b.amount) { const val = parseFloat(b.amount); if (!isNaN(val)) total += val; }});
        document.getElementById("billTotalDisplay").textContent = "$" + total.toLocaleString();
    }

    function renderFixedBills() {
      const billListEl = document.getElementById("billList");
      billListEl.innerHTML = "";
      if (fixedBills.length === 0) { 
          billListEl.innerHTML = `<p class="text-sm text-ink/40 text-center py-12 font-bold">目前沒有待繳項目 ✨</p>`; 
          updateBillSummary(); return; 
      }
      fixedBills.forEach((b, i) => {
        const div = document.createElement("div");
        div.className = "flex items-center gap-3 py-3 border-b border-lavenderBorder px-2";
        div.innerHTML = `
          <input type="checkbox" class="custom-checkbox flex-shrink-0" ${b.done ? "checked" : ""} onchange="checkBill(${i})" />
          <div class="flex-1 flex items-center bg-lavenderSoft rounded-xl px-4 py-3">
            <input type="text" class="bill-input-name font-bold ${b.done ? 'bill-done' : ''}" value="${b.name || ''}" onblur="updateBill(${i}, 'name', this.value)" placeholder="內容..." />
            <span class="text-ink/20 mx-2">|</span>
            <input type="number" inputmode="decimal" class="bill-input-amount ${b.done ? 'bill-done' : ''}" value="${b.amount || ''}" onblur="updateBill(${i}, 'amount', this.value)" placeholder="0" />
          </div>
          <button onclick="deleteBill(${i})" class="text-[12px] text-ink/40 font-bold px-1 flex-shrink-0 hover:text-rose">刪除</button>
        `;
        billListEl.appendChild(div);
      });
      updateBillSummary();
    }

    window.updateBill = (i, field, val) => { 
      fixedBills[i][field] = val; 
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); 
      if (field === 'amount') renderFixedBills();
    };

    document.getElementById("addBillBtn").onclick = () => {
      fixedBills.push({ name: "", amount: "", done: false });
      localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills();
      const inputs = document.getElementById("billList").querySelectorAll('.bill-input-name');
      if(inputs.length > 0) inputs[inputs.length - 1].focus();
    };

    window.checkBill = (i) => { fixedBills[i].done = !fixedBills[i].done; localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills(); };
    window.deleteBill = (i) => { if (confirm("確定刪除？")) { fixedBills.splice(i, 1); localStorage.setItem(FIXED_BILLS_KEY, JSON.stringify(fixedBills)); renderFixedBills(); } };

    function renderPieChart(list) {
      const ctx = document.getElementById("expensePieChart");
      const data = {}; list.filter(e => e.type==='expense').forEach(e => { if(e.mainCategory) data[e.mainCategory] = (data[e.mainCategory]||0) + e.amount; });
      if(pieChart) pieChart.destroy();
      pieChart = new Chart(ctx, { type:'pie', data: { labels:Object.keys(data), datasets:[{ data:Object.values(data), backgroundColor: chartColors }] }, options: { plugins: { legend: { position:'bottom', labels: { font:{size:14, family: "'Zen Maru Gothic', sans-serif"}, color: '#5C3A2E' } } } } });
    }

    function safeCalculate(expression) {
        if(!expression) return "";
        let str = expression.toString().replace(/×/g, '*').replace(/÷/g, '/');
        try { const result = new Function('return ' + str)(); return (!isFinite(result) || isNaN(result)) ? expression : String(result); } catch(e) { return expression; }
    }

    document.getElementById("calcKeypad").onclick = (e) => {
      const v = e.target.dataset.val; if(!v) return;
      let display = document.getElementById("calcDisplay");
      if(v === 'C') display.textContent = '0';
      else if (v === 'DEL') display.textContent = display.textContent.length > 1 ? display.textContent.slice(0, -1) : '0';
      else if(v === '=') display.textContent = safeCalculate(display.textContent);
      else display.textContent = (display.textContent === '0' && !['+', '-', '*', '/'].includes(v)) ? v : display.textContent + v;
    };

    document.getElementById("btnIncome").onclick = () => setupForm('income');
    document.getElementById("btnExpense").onclick = () => setupForm('expense');
    document.getElementById("btnSaving").onclick = () => setupForm('saving');
    document.getElementById("monthFilter").onchange = render;

    init();
  </script>
</body>
</html>
